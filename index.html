<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%}
body{font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;background:#0B1628;color:white;overflow:hidden;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:#0B1628}
::-webkit-scrollbar-thumb{background:#C9A84C;border-radius:2px}

/* ── tokens ── */
/* WCAG-AA high-vis gold for small functional text: #D4A843 on #0B1628 = 4.6:1 */
/* Decorative foil gold kept for display: #C9A84C */

/* ── keyframes ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(44px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-44px)}to{opacity:1;transform:translateX(0)}}
@keyframes foilShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes igniteBtn{0%{filter:grayscale(1)opacity(.35)}55%{filter:grayscale(0)opacity(1)brightness(1.4)}100%{filter:grayscale(0)opacity(1)brightness(1)}}
@keyframes borderBleed{0%{box-shadow:0 0 0 0 rgba(201,168,76,0)}50%{box-shadow:0 0 0 7px rgba(201,168,76,.35),0 0 32px 4px rgba(201,168,76,.18)}100%{box-shadow:0 0 0 2px rgba(201,168,76,.18)}}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes typingPulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}}
@keyframes lightSweep{0%{left:-60%}100%{left:160%}}
@keyframes skeletonMove{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes laneDrawDesktop{0%{stroke-dashoffset:600}100%{stroke-dashoffset:0}}
@keyframes missionGlow{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}50%{box-shadow:0 0 24px 2px rgba(201,168,76,.12)}}

/* QR unbox sequence */
@keyframes scanLine{0%{top:0%}100%{top:100%}}
@keyframes cardReveal{0%{opacity:0;transform:scale(.85) rotateY(20deg)}60%{transform:scale(1.04) rotateY(-4deg)}100%{opacity:1;transform:scale(1) rotateY(0)}}
@keyframes goldRipple{0%{transform:scale(0);opacity:.9}100%{transform:scale(3.5);opacity:0}}
@keyframes envelopeOpen{0%{transform:scaleY(1);transform-origin:top}100%{transform:scaleY(0);transform-origin:top}}
@keyframes waveform{0%,100%{transform:scaleY(.2)}50%{transform:scaleY(1)}}
@keyframes privacyBlur{0%{filter:blur(0px)}100%{filter:blur(6px)}}
@keyframes radarDraw{0%{stroke-dashoffset:1000}100%{stroke-dashoffset:0}}
@keyframes highlightPulse{0%{background:rgba(201,168,76,.22)}60%{background:rgba(201,168,76,.08)}100%{background:rgba(201,168,76,.0)}}
.vouch-highlight{animation:highlightPulse 2s ease forwards;border-radius:6px;padding:2px 0}
@keyframes bulletReveal{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes goldSweep{0%{background-position:200% center}100%{background-position:-200% center}}
.btn-gold-sweep{background-size:300% auto;animation:goldSweep .7s ease forwards;background-image:linear-gradient(90deg,#8B6914,#C9A84C,#E8C97A,#fff,#E8C97A,#C9A84C,#8B6914)!important;}
@keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(201,168,76,.4)}70%{box-shadow:0 0 0 10px rgba(201,168,76,0)}100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}}

.verified-ring{animation:verifiedRingPulse 2.4s ease infinite;border:2px solid #C9A84C !important}
@keyframes cardFlipHalf{0%{transform:perspective(800px) rotateY(0)}100%{transform:perspective(800px) rotateY(90deg)}}

.fade-up{animation:fadeUp .42s ease forwards}
.fade-in{animation:fadeIn .5s ease forwards}
.slide-right{animation:slideRight .36s cubic-bezier(.25,.8,.25,1) forwards}
.slide-left{animation:slideLeft .36s cubic-bezier(.25,.8,.25,1) forwards}

.gold-text{

.btn-gold{

.btn-gold::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);transform:skewX(-20deg)}
.btn-gold:hover:not(:disabled)::after{animation:lightSweep .55s ease}
.btn-gold:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 28px rgba(201,168,76,.4);background-position:right center}
.btn-gold:disabled{filter:grayscale(1);opacity:.35;cursor:not-allowed}
.btn-gold.ignited{animation:igniteBtn .65s ease forwards}
.btn-ghost{background:transparent;color:#D4A843;border:1px solid rgba(201,168,76,.35);cursor:pointer;

.scroll-y{overflow-y:auto}
.typing-dot{width:7px;height:7px;border-radius:50%;background:#C9A84C;display:inline-block;margin:0 2px;animation:typingPulse 1.2s ease infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
.skeleton{background:linear-gradient(90deg,#122040 25%,#1A2E55 50%,#122040 75%);background-size:400% 100%;animation:skeletonMove 1.8s ease infinite;border-radius:8px}
.mission-pulse{animation:missionGlow 3s ease infinite}
.view-toggle{display:flex;background:rgba(18,32,64,.85);border:1px solid rgba(201,168,76,.22);border-radius:8px;overflow:hidden}
.view-toggle button{padding:7px 14px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;transition:all .2s}
/* Nav button global override */
.glass-nav button:not(.view-toggle button){font-size:13px!important;padding:7px 14px!important}

/* waveform bars */
.wave-bar{width:3px;border-radius:2px;background:linear-gradient(180deg,#C9A84C,#8B6914);transform-origin:center;animation:waveform .8s ease infinite}

/* privacy shield */
.privacy-blur{animation:privacyBlur .4s ease forwards;filter:blur(6px);user-select:none}
.privacy-clear{filter:blur(0);transition:filter .4s ease}

/* meeting funnel steps */
.funnel-step{opacity:.4;transition:opacity .3s}
.funnel-step.active{opacity:1}

/* ══ TILT HOOK ══ */
function useTilt(ref){
  const onMove=useCallback(e=>{
    if(!ref.current)return;
    const r=ref.current.getBoundingClientRect();
    const x=((e.clientX-r.left)/r.width-.5)*14,y=((e.clientY-r.top)/r.height-.5)*-14;
    ref.current.style.transform=`perspective(600px) rotateY(${x}deg) rotateX(${y}deg) scale(1.02)`;
    ref.current.style.boxShadow=`${-x*1.5}px ${y*1.2}px 38px rgba(201,168,76,.24)`;
  },[ref]);
  const onLeave=useCallback(()=>{
    if(!ref.current)return;
    ref.current.style.transform="perspective(600px) rotateY(0) rotateX(0) scale(1)";
    ref.current.style.boxShadow="none";
  },[ref]);
  return{onMouseMove:onMove,onMouseLeave:onLeave};
}

/* ══════════════════════════════════════════════
   CHARACTER RADAR CHART (upgraded: color prop, zero-state, animated)
══════════════════════════════════════════════ */
function RadarChart({scores,size=140,color=G,animated=true}){
  const cx=size/2,cy=size/2,r=size*0.37;
  const TLABELS=["Coachability","EQ","Motivation","Temperament"];
  const raw=[scores.coachability,scores.eq,scores.motivation,scores.temperament];
  const vals=raw.map(v=>(v||0)/100);
  // zero-state: all scores 0 — render "incomplete" indicator
  const isEmpty=raw.every(v=>!v||v===0);
  // partial: fewer than 2 non-zero traits
  const filledCount=raw.filter(v=>v&&v>0).length;
  const isPartial=filledCount>0&&filledCount<2;
  const ang=i=>(i/4)*Math.PI*2-Math.PI/2;
  const pt=(i,s=1)=>({x:cx+Math.cos(ang(i))*r*s,y:cy+Math.sin(ang(i))*r*s});
  const poly=vals.map((v,i)=>{const p=pt(i,v);return`${p.x},${p.y}`}).join(" ");
  return(
    <div style={{position:"relative",display:"inline-flex",flexDirection:"column",alignItems:"center"}}>
      <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size,overflow:"visible",opacity:isEmpty?.3:1}}>
        {[.25,.5,.75,1].map(s=>(
          <polygon key={s} points={[0,1,2,3].map(i=>{const p=pt(i,s);return`${p.x},${p.y}`}).join(" ")}
            fill="none" stroke={`${color}${s===1?"44":"1A"}`} strokeWidth={s===1?"1":".5"}/>
        ))}
        {[0,1,2,3].map(i=>{const p=pt(i);return<line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke={`${color}18`} strokeWidth=".5"/>})}
        {!isEmpty&&(
          <polygon points={poly} fill={`${color}20`} stroke={color} strokeWidth="1.5"
            strokeDasharray={animated?"1000":"none"} strokeDashoffset={animated?"1000":0}
            style={animated?{animation:"radarDraw 1.1s ease forwards"}:{}}/>
        )}
        {!isEmpty&&vals.map((v,i)=>{if(!v)return null;const p=pt(i,v);return(
          <circle key={i} cx={p.x} cy={p.y} r="3" fill={color} style={{filter:`drop-shadow(0 0 3px ${color})`}}/>
        )})}
        {[0,1,2,3].map(i=>{const p=pt(i,1.35);return(
          <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle"
            fill={raw[i]>0?"#D0C9BC":"#7A7068"} fontSize="12" fontFamily="DM Sans" fontWeight="600">{TLABELS[i]}</text>
        )})}
      </svg>
      {isEmpty&&(
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",
          background:`${NAV}cc`,borderRadius:6,padding:"4px 8px",whiteSpace:"nowrap"}}>
          <span style={{fontSize:9,color:GHV,letterSpacing:".08em"}}>AWAITING TRAITS</span>
        </div>
      )}
      {isPartial&&(
        <div style={{marginTop:4,background:`${G}15`,border:`1px solid ${G}33`,borderRadius:4,padding:"2px 8px"}}>
          <span style={{fontSize:8,color:GHV,letterSpacing:".08em"}}>INCOMPLETE PROFILE</span>
        </div>
      )}
    </div>
  );
}

const POLISHED_BULLETS=[
  {trait:"Leadership Presence","text":"Demonstrates rare instinctual people-reading ability honed over a 20-year professional context — defuses situations that break most managers."},
  {trait:"Retention Record","text":"Consistently turns around team culture within 90 days and retains staff that other leaders cannot — a direct revenue-protecting behavior."},
  {trait:"Emotional Stability","text":"Maintains composure under sustained high-pressure conditions without sacrificing standards or team morale."},
  {trait:"Verdict","text":"Sarah is exactly the kind of leader this industry needs more of. She is ready for a stage commensurate with her impact."},
];

function VoiceToVouch({onTranscribed}){
  const [state,setState]=useState("idle"); // idle → recording → processing → polishing → done
  const [transcript,setTranscript]=useState("");
  const [bullets,setBullets]=useState([]);
  const [showRaw,setShowRaw]=useState(false);
  const timerRef=useRef();

  const startRecording=()=>{
    setState("recording");
    timerRef.current=setTimeout(()=>triggerProcess(),3000);
  };

  const triggerProcess=()=>{
    clearTimeout(timerRef.current);
    setState("processing");
    setTimeout(()=>{
      setState("polishing");
      setBullets([]);
      // Reveal bullets one at a time
      POLISHED_BULLETS.forEach((_,i)=>{
        setTimeout(()=>{
          setBullets(prev=>[...prev,POLISHED_BULLETS[i]]);
          if(i===POLISHED_BULLETS.length-1){
            setTimeout(()=>{
              setTranscript(POLISHED_BULLETS.map(b=>`• ${b.text}`).join("\n\n"));
              setState("done");
            },600);
          }
        },i*700);
      });
    },1600);
  };

  const reset=()=>{setState("idle");setTranscript("");setBullets([]);setShowRaw(false);clearTimeout(timerRef.current);};
  const bars=Array.from({length:24},(_,i)=>i);

  return(
    <div>
      {state==="idle"&&(
        <div style={{textAlign:"center",padding:"28px 0"}}>

        </div>
      )}

      {state==="recording"&&(
        <div className="fade-up" style={{textAlign:"center",padding:"20px 0"}}>
          <div style={{fontSize:11,color:"#E85555",letterSpacing:".15em",textTransform:"uppercase",marginBottom:16}}>● Recording…</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3,height:48,marginBottom:20}}>
            {bars.map(i=>(
              <div key={i} className="wave-bar" style={{height:`${20+Math.random()*28}px`,animationDelay:`${i*.05}s`,animationDuration:`${0.6+Math.random()*.4}s`}}/>
            ))}
          </div>
          <p style={{fontSize:12,color:`${CR}55`,marginBottom:16}}>Speak naturally. Describe what sets this person apart.</p>
          <button className="btn-ghost" onClick={triggerProcess} style={{padding:"10px 24px",borderRadius:8}}>Stop Recording</button>
        </div>
      )}

      {state==="processing"&&(
        <div className="fade-up" style={{textAlign:"center",padding:"28px 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:4,justifyContent:"center",marginBottom:10}}>
            <span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/>
          </div>
          <div style={{fontSize:12,color:`${CR}55`}}>Transcribing your voice…</div>
        </div>
      )}

      {state==="polishing"&&(
        <div className="fade-up" style={{padding:"8px 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <div style={{width:22,height:22,background:`linear-gradient(135deg,${GD},${G})`,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,flexShrink:0}}>✦</div>
            <div>
              <div style={{fontSize:10,letterSpacing:".1em",textTransform:"uppercase",color:GHV}}>AI Refiner · Polishing…</div>
              <div style={{fontSize:10,color:`${CR}44`}}>Turning your words into executive-grade language</div>
            </div>
            <div style={{marginLeft:"auto",display:"flex",gap:3,alignItems:"center"}}>
              <span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/>
            </div>
          </div>
          {/* raw transcript collapsed */}
          <div style={{background:NL,borderRadius:7,padding:"7px 12px",marginBottom:12,cursor:"pointer"}}
            onClick={()=>setShowRaw(r=>!r)}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:9,color:`${CR}44`,letterSpacing:".08em",textTransform:"uppercase"}}>Raw Transcript</span>
              <span style={{fontSize:9,color:`${CR}33`}}>{showRaw?"▲":"▼"}</span>
            </div>
            {showRaw&&<p style={{fontSize:10,color:`${CR}44`,lineHeight:1.6,marginTop:6,fontStyle:"italic"}}>{RAW_TRANSCRIPT}</p>}
          </div>
          {/* bullets appear one by one */}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {bullets.map((b,i)=>(
              <div key={i} style={{background:`${G}08`,border:`1px solid ${G}22`,borderRadius:8,padding:"10px 12px",animation:"bulletReveal .4s ease forwards"}}>
                <div style={{fontSize:9,color:GHV,letterSpacing:".08em",textTransform:"uppercase",marginBottom:3}}>{b.trait}</div>
                <div style={{fontSize:11,color:CR,lineHeight:1.6}}>• {b.text}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {state==="done"&&(
        <div className="fade-up">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>

            <span>{transcript.length} chars · voice → AI refined</span>
            <span style={{color:G}}>✓ Ready to issue</span>
          </div>
          <button className="btn-gold" onClick={()=>onTranscribed&&onTranscribed(transcript)} style={{width:"100%",padding:"13px",borderRadius:10,marginTop:12,fontSize:12}}>Use This Vouch →</button>
        </div>
      )}
    </div>
  );
}

const TSTEPS=["landing","welcome","passion","growth","aspiration","character","dashboard"];
const TLBLS=["Landing","Welcome","Passion","Growth","Aspiration","Character","Dashboard"];

function TalentFlow({mobile,initialStep=0,personaName="Maria"}){
  // localStorage persistence for demo safety
  const LS_STEP="nl_talent_step";
  const LS_ANS="nl_talent_ans";

  const [step,setStep]=useState(()=>{
    if(initialStep>0)return initialStep; // QR Accept overrides
    try{const s=localStorage.getItem(LS_STEP);return s?parseInt(s,10):0;}catch{return 0;}
  });
  const [dir,setDir]=useState("right");
  const [ans,setAns]=useState(()=>{
    try{const a=localStorage.getItem(LS_ANS);return a?JSON.parse(a):{passion:"",growth:"",aspiration:""};}catch{return{passion:"",growth:"",aspiration:""};}
  });
  const [showQuote,setShowQuote]=useState(false);
  const [animKey,setAnimKey]=useState(0);
  const [copilotVisible,setCopilotVisible]=useState(false);
  const copilotTimerRef=useRef();
  const tiltRef=useRef();
  const tilt=useTilt(tiltRef);

  const cur=TSTEPS[step];

  // Persist step + answers to localStorage
  useEffect(()=>{try{localStorage.setItem(LS_STEP,step);}catch{}},[ step]);
  useEffect(()=>{try{localStorage.setItem(LS_ANS,JSON.stringify(ans));}catch{}},[ans]);

  // Start/reset the 10s AI co-pilot timer whenever we're on a writing screen
  useEffect(()=>{
    clearTimeout(copilotTimerRef.current);
    setCopilotVisible(false);
    const writingScreens=["passion","growth","aspiration"];
    if(writingScreens.includes(cur)){
      copilotTimerRef.current=setTimeout(()=>setCopilotVisible(true),10000);
    }
    return()=>clearTimeout(copilotTimerRef.current);
  },[cur]);

  const go=n=>{
    setDir(n>step?"right":"left");setStep(n);setAnimKey(k=>k+1);
    if(n>step&&navigator.vibrate)navigator.vibrate([30]); // step-complete haptic
    if(TSTEPS[n]==="welcome"){setShowQuote(false);setTimeout(()=>setShowQuote(true),1600);}
  };  const next=()=>go(Math.min(step+1,TSTEPS.length-1));
  const prev=()=>go(Math.max(step-1,0));
  const cls=dir==="right"?"slide-right":"slide-left";

  // If we started at Welcome via QR accept, trigger the quote animation

    if(initialStep===1&&cur==="welcome"){setShowQuote(false);setTimeout(()=>setShowQuote(true),1600);}

  const traits=[{key:"Coachability",icon:"🧠",desc:"Adapts fast, listens deeply",active:true},{key:"Emotional Intelligence",icon:"💡",desc:"Reads rooms, builds loyalty",active:true},{key:"Motivation",icon:"🔥",desc:"Driven to outperform",active:false},{key:"Temperament",icon:"⚖️",desc:"Steady under pressure",active:false}];

    </div>
  );
  return(
    <>
      {inner}
      <AICopilotToast screen={cur} visible={copilotVisible} onDismiss={()=>setCopilotVisible(false)}/>
    </>
  );
}

function WritingScreen({cur,idx,val,title,hint,placeholders,scoutNote,question,mobile,animKey,cls,mxw,onChange,onVoiceDone,next,prev}){
  const [phIdx,setPhIdx]=useState(0);
  const [noteVisible,setNoteVisible]=useState(false);
  const noteTimerRef=useRef();

  // Cycle placeholders every 10s when textarea is empty
  useEffect(()=>{
    const t=setInterval(()=>setPhIdx(i=>(i+1)%placeholders.length),10000);
    return()=>clearInterval(t);
  },[placeholders.length]);

  // Show Scout's Note after 6s on the screen (separate from the copilot toast)
  useEffect(()=>{
    setNoteVisible(false);
    noteTimerRef.current=setTimeout(()=>setNoteVisible(true),6000);
    return()=>clearTimeout(noteTimerRef.current);
  },[cur]);

  // Hide note once user starts typing
  useEffect(()=>{if(val.length>10)setNoteVisible(false);},[val]);

  const canContinue=cur==="passion"?val.length>=20:true;

  return(
    <div key={animKey} className={cls} style={{maxWidth:mxw,width:"100%"}}>
      <div style={{fontSize:10,letterSpacing:".16em",textTransform:"uppercase",color:GHV,marginBottom:7}}>Step {idx} of 5</div>
      <h2 style={{fontFamily:"Cormorant Garamond",fontSize:mobile?28:38,color:CR,marginBottom:5,lineHeight:1.2}}>{title}</h2>
      <p style={{color:`${CR}77`,fontSize:12,marginBottom:14}}>{hint}</p>
      <VoiceToPrompt question={question} onDone={onVoiceDone}/>
      <div style={{fontSize:9,color:`${CR}44`,marginBottom:10,textAlign:"center",letterSpacing:".06em",textTransform:"uppercase"}}>— or type below —</div>

      {/* Textarea + Scout's Note overlay */}
      <div style={{position:"relative"}}>
        <textarea value={val} onChange={e=>onChange(e.target.value)}
          className="stationery" placeholder={placeholders[phIdx]}
          style={{width:"100%",minHeight:mobile?110:128,resize:"none",borderRadius:10,padding:mobile?14:18,outline:"none",transition:"border-color .3s"}}/>

        {/* Scout's Note — inline corner card */}
        {noteVisible&&val.length===0&&(
          <div className="fade-up" style={{position:"absolute",top:8,right:8,maxWidth:mobile?160:200,background:`linear-gradient(135deg,${NM}ee,${NL}ee)`,backdropFilter:"blur(8px)",border:`1px solid ${G}55`,borderRadius:9,padding:"9px 11px",zIndex:10,pointerEvents:"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
              <img src="https://i.pravatar.cc/18?img=12" style={{width:18,height:18,borderRadius:"50%",border:`1px solid ${G}`}} alt="scout"/>
              <span style={{fontSize:9,color:GL,fontWeight:600}}>James' Note</span>
              <span style={{marginLeft:"auto",fontSize:8,color:GHV,background:`${G}15`,padding:"1px 5px",borderRadius:3}}>{scoutNote.badge}</span>
            </div>
            <p style={{fontFamily:"Cormorant Garamond",fontSize:mobile?11:12,color:CR,lineHeight:1.55,fontStyle:"italic",margin:0}}>
              "{scoutNote.text}"
            </p>
          </div>
        )}
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"5px 0 18px"}}>
        <span style={{fontSize:9,color:`${CR}44`}}>{val.length} characters{cur==="passion"&&val.length<20&&val.length>0?` · ${20-val.length} more to unlock`:""}</span>
        {val.length>=20&&<span style={{fontSize:9,color:GHV}}>✓ Ready</span>}
      </div>

      {!mobile&&(
        <div style={{display:"flex",gap:10}}>
          <button className="btn-ghost" onClick={prev} style={{padding:"12px 20px",borderRadius:9,flex:1}}>← Back</button>
          <button className="btn-gold" onClick={next} disabled={!canContinue} style={{padding:"12px 20px",borderRadius:9,flex:2}}>
            {cur==="aspiration"?"Almost there →":"Continue →"}
          </button>
        </div>
      )}
    </div>
  );
}

   ROOT
══════════════════════════════════════════════ */
function App(){
  const [view,setView]=useState(()=>{
    const p=new URLSearchParams(window.location.search);
    const hash=window.location.hash.replace("#","");
    const v=p.get("view")||hash;
    if(v==="scout")return"scout";
    if(v==="talent")return"talent";
    if(v==="recruiter")return"recruiter";
    return"qr";
  });
  const [talentStartStep,setTalentStartStep]=useState(0);
  const [talentPersonaName,setTalentPersonaName]=useState(()=>{
    const p=new URLSearchParams(window.location.search);
    return p.get("name")||"Maria";
  });
  const [mobile,setMobile]=useState(()=>window.innerWidth<=768);
  const [error,setError]=useState(null);

  useEffect(()=>{
    const onResize=()=>setMobile(window.innerWidth<=768);
    window.addEventListener("resize",onResize);
    return()=>window.removeEventListener("resize",onResize);
  },[]);

  useEffect(()=>{
    const t=setTimeout(()=>setError("We've hit a temporary roadblock in the lane. We're working to clear the path — stay with us."),12000);
    return()=>clearTimeout(t);
  },[]);

  const content=(
    <>
      {view==="qr"        && <QRUnboxFlow   mobile={mobile} setView={setView} setTalentStartStep={setTalentStartStep}/>}
      {view==="talent"    && <TalentFlow    mobile={mobile} initialStep={talentStartStep} personaName={talentPersonaName}/>}
      {view==="scout"     && <ScoutFlow     mobile={mobile}/>}
      {view==="recruiter" && <RecruiterFlow mobile={mobile}/>}
      {view==="card"      && <PhysicalCard  mobile={mobile}/>}
      {view==="analytics" && <AnalyticsView mobile={mobile}/>}
      {view==="admin"     && <AdminDashboard mobile={mobile}/>}
    </>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <TopNav view={view} setView={setView} mobile={mobile} setMobile={setMobile}/>
      {mobile?(
        <MobileFrame>{content}</MobileFrame>
      ):(
        <div style={{flex:1,overflow:"hidden"}}>{content}</div>
      )}
      {error&&<ErrorToast msg={error} onClose={()=>setError(null)}/>}
    </div>
  );
}

            </div>

            {/* Per-talent wage cards */}
            <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:18}}>
              {TALENTS.map((t,i)=>{
                const lift=t.wageTo-t.wageFrom;
                const pct=Math.round((lift/t.wageFrom)*100);
                const barW=Math.round((lift/69)*100);
                return(
                  <div key={t.id} className="card" style={{padding:mobile?14:18}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                      <img src={`https://i.pravatar.cc/34?img=${20+i}`} style={{width:34,height:34,borderRadius:"50%",border:`2px solid ${G}44`}} alt={t.name}/>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:600,color:CR}}>{t.name}</div>
                        <div style={{fontSize:10,color:`${CR}55`}}>Vouched by {t.scout}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div className="mono" style={{fontSize:10,color:`${CR}33`,textDecoration:"line-through"}}>${t.wageFrom}k</div>
                        <div className="mono" style={{fontSize:18,color:G,fontWeight:700}}>${t.wageTo}k</div>
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{flex:1,height:5,background:NL,borderRadius:3,overflow:"hidden"}}>
                        <div style={{width:`${barW}%`,height:"100%",background:`linear-gradient(90deg,${GD},${G},${GL})`,borderRadius:3}}/>
                      </div>
                      <span style={{fontSize:10,color:GL,fontWeight:600,flexShrink:0}}>+${lift}k</span>
                      <span style={{fontSize:9,color:GHV,background:`${G}15`,padding:"1px 6px",borderRadius:3,flexShrink:0}}>+{pct}%</span>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Series A narrative */}
            <div className="card" style={{padding:mobile?16:20,background:`${G}08`,border:`1px solid ${G}44`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{width:22,height:22,background:`linear-gradient(135deg,${GD},${G})`,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10}}>📊</div>
                <div style={{fontSize:9,letterSpacing:".12em",textTransform:"uppercase",color:GHV}}>Series A Investor Narrative</div>
              </div>
              <div style={{fontFamily:"Cormorant Garamond",fontSize:mobile?15:17,color:CR,lineHeight:1.78,marginBottom:16}}>
                "NextLane isn't a hiring tool — it's a <span style={{color:GL}}>regional economic engine</span>. In Month 1, we generated <span style={{color:GL}}>$69,000 in projected wage increases</span> across just 3 placements in NWA. At 50 placements per month, that's <span style={{color:GL}}>$1.15M in annual wage lift</span> per cohort — compounding year over year as Scouts earn placement credits and reinvest them."
              </div>
              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"repeat(3,1fr)",gap:10}}>
                {[{l:"Month 1 Wage Lift",v:"$69k",c:G},{l:"Proj. @ 50 placements/mo",v:"$1.15M/yr",c:GL},{l:"Multiplier per Scout",v:"7× wages",c:"#4CAF50"}].map(m=>(
                  <div key={m.l} style={{background:NL,borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
                    <div className="mono" style={{fontSize:mobile?16:20,color:m.c,fontWeight:700,lineHeight:1,marginBottom:3}}>{m.v}</div>
                    <div style={{fontSize:9,color:`${CR}44`}}>{m.l}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
