<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Next Lane — Foundation Gate Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:#0B1628;
  color:white;
  overflow:hidden;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:#0B1628}
::-webkit-scrollbar-thumb{background:#C9A84C;border-radius:2px}

/* ── Keyframes ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(44px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-44px)}to{opacity:1;transform:translateX(0)}}
@keyframes foilShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes igniteBtn{0%{filter:grayscale(1) opacity(.35)}55%{filter:grayscale(0) opacity(1) brightness(1.4)}100%{filter:grayscale(0) opacity(1) brightness(1)}}
@keyframes borderBleed{0%{box-shadow:0 0 0 0 rgba(201,168,76,0)}50%{box-shadow:0 0 0 6px rgba(201,168,76,.35),0 0 32px 4px rgba(201,168,76,.18)}100%{box-shadow:0 0 0 2px rgba(201,168,76,.18)}}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes typingPulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}}
@keyframes lightSweep{0%{left:-60%}100%{left:160%}}
@keyframes goldPulse{0%,100%{opacity:.18}50%{opacity:.45}}
@keyframes skeletonMove{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes laneDrawDesktop{0%{stroke-dashoffset:600}100%{stroke-dashoffset:0}}
@keyframes laneDrawMobile{0%{stroke-dashoffset:400}100%{stroke-dashoffset:0}}
@keyframes errorShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
@keyframes missionGlow{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}50%{box-shadow:0 0 24px 2px rgba(201,168,76,.12)}}

.fade-up{animation:fadeUp .42s ease forwards}
.slide-right{animation:slideRight .36s cubic-bezier(.25,.8,.25,1) forwards}
.slide-left{animation:slideLeft .36s cubic-bezier(.25,.8,.25,1) forwards}

.gold-text{
  background:linear-gradient(90deg,#8B6914 0%,#C9A84C 25%,#F0D980 50%,#C9A84C 75%,#8B6914 100%);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:foilShimmer 4s linear infinite;
}
.btn-gold{
  background:linear-gradient(135deg,#8B6914 0%,#C9A84C 30%,#F0D980 55%,#C9A84C 80%,#8B6914 100%);
  background-size:250% auto;color:#0B1628;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;font-size:12px;position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s,background-position .4s;
}
.btn-gold::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);
  transform:skewX(-20deg)}
.btn-gold:hover:not(:disabled)::after{animation:lightSweep .55s ease}
.btn-gold:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 28px rgba(201,168,76,.4);background-position:right center}
.btn-gold:disabled{filter:grayscale(1);opacity:.35;cursor:not-allowed}
.btn-gold.ignited{animation:igniteBtn .65s ease forwards}
.btn-ghost{background:transparent;color:#C9A84C;border:1px solid rgba(201,168,76,.3);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  font-size:11px;transition:border-color .2s,background .2s,transform .2s}
.btn-ghost:hover{border-color:#C9A84C;background:rgba(201,168,76,.07);transform:translateY(-1px)}
.card{background:#122040;border:1px solid rgba(201,168,76,.12);border-radius:12px}
.card-glow{transition:border-color .25s,box-shadow .25s}
.card-glow:hover{border-color:rgba(201,168,76,.36);box-shadow:0 0 32px rgba(201,168,76,.08)}
.glass-nav{background:rgba(11,22,40,.78);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(201,168,76,.18)}
.stationery{background:rgba(245,240,232,.055)!important;border:1px solid rgba(245,240,232,.14)!important;
  color:#F5F0E8!important;font-family:'Cormorant Garamond',serif!important;font-size:16px!important;
  line-height:1.85!important;letter-spacing:.01em;transition:box-shadow .3s!important}
.stationery::placeholder{color:rgba(245,240,232,.22)!important;font-style:italic}
.stationery.ignite-border{animation:borderBleed .7s ease forwards}
.mono{font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
input{background:#1A2E55;border:1px solid rgba(201,168,76,.13);border-radius:8px;
  padding:12px 14px;color:#F5F0E8;font-size:14px;font-family:'DM Sans',sans-serif;
  outline:none;transition:border-color .2s}
input:focus{border-color:rgba(201,168,76,.5)}
input::placeholder{color:rgba(245,240,232,.28)}
.scroll-y{overflow-y:auto}
.typing-dot{width:7px;height:7px;border-radius:50%;background:#C9A84C;
  display:inline-block;margin:0 2px;animation:typingPulse 1.2s ease infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
.code-slot{width:44px;height:60px;border-radius:8px;border:1px solid rgba(201,168,76,.35);
  display:flex;align-items:center;justify-content:center;font-size:22px;transition:all .3s}
.code-slot.filled{background:linear-gradient(145deg,rgba(201,168,76,.18),rgba(201,168,76,.08));
  box-shadow:0 0 12px rgba(201,168,76,.2)}
.code-slot.empty{background:rgba(255,255,255,.02);border-style:dashed;border-color:rgba(201,168,76,.18)}
.tooltip-wrap{position:relative;display:inline-block}
.tooltip-box{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:rgba(18,32,64,.97);backdrop-filter:blur(8px);border:1px solid rgba(201,168,76,.35);
  border-radius:10px;padding:12px 16px;width:240px;font-size:12px;color:#F5F0E8;line-height:1.6;
  z-index:300;pointer-events:none;white-space:normal}
.tooltip-wrap:hover .tooltip-box{display:block}

/* Skeleton shimmer */
.skeleton{background:linear-gradient(90deg,#122040 25%,#1A2E55 50%,#122040 75%);
  background-size:400% 100%;animation:skeletonMove 1.8s ease infinite;border-radius:8px}

/* Mission awaiting */
.mission-pulse{animation:missionGlow 3s ease infinite}

/* View toggle */
.view-toggle{display:flex;background:rgba(18,32,64,.8);border:1px solid rgba(201,168,76,.2);
  border-radius:8px;overflow:hidden}
.view-toggle button{padding:6px 14px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;transition:all .2s}
</style>
</head>
<body><div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const G="#C9A84C",GL="#E8C97A",GD="#8B6914",NAV="#0B1628",NM="#122040",NL="#1A2E55",CR="#F5F0E8";

/* ── UTILS ── */
function useTilt(ref){
  const onMove=useCallback(e=>{
    if(!ref.current)return;
    const r=ref.current.getBoundingClientRect();
    const x=((e.clientX-r.left)/r.width-.5)*14;
    const y=((e.clientY-r.top)/r.height-.5)*-14;
    ref.current.style.transform=`perspective(600px) rotateY(${x}deg) rotateX(${y}deg) scale(1.02)`;
    ref.current.style.boxShadow=`${-x*1.5}px ${y*1.2}px 38px rgba(201,168,76,.24)`;
  },[ref]);
  const onLeave=useCallback(()=>{
    if(!ref.current)return;
    ref.current.style.transform="perspective(600px) rotateY(0) rotateX(0) scale(1)";
    ref.current.style.boxShadow="none";
  },[ref]);
  return{onMouseMove:onMove,onMouseLeave:onLeave};
}

/* ── TOP NAV ── */
function TopNav({view,setView,mobile,setMobile}){
  const tabs=[{id:"talent",label:"Talent Journey"},{id:"scout",label:"Scout Center"},{id:"recruiter",label:"Recruiter Feed"}];
  return(
    <div className="glass-nav" style={{padding:"0 20px",display:"flex",alignItems:"center",
      justifyContent:"space-between",height:58,position:"sticky",top:0,zIndex:200,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:9}}>
        <div style={{width:28,height:28,background:`linear-gradient(135deg,${GD},${G},${GL})`,
          borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",
          boxShadow:`0 0 10px ${G}44`}}>
          <span style={{color:NAV,fontSize:14,fontWeight:700,fontFamily:"Cormorant Garamond"}}>N</span>
        </div>
        <span style={{fontFamily:"Cormorant Garamond",fontSize:18,fontWeight:600,letterSpacing:".12em",color:CR}}>NEXT LANE</span>
      </div>
      <div style={{display:"flex",gap:3}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setView(t.id)}
            style={{padding:"6px 14px",borderRadius:7,border:"none",cursor:"pointer",
              fontFamily:"DM Sans",fontSize:11,fontWeight:500,letterSpacing:".06em",transition:"all .2s",
              background:view===t.id?`linear-gradient(135deg,${GD},${G},${GL})`:"transparent",
              color:view===t.id?NAV:`${CR}99`,
              boxShadow:view===t.id?`0 3px 12px ${G}44`:"none"}}>
            {t.label}
          </button>
        ))}
      </div>
      <div className="view-toggle">
        <button onClick={()=>setMobile(false)}
          style={{background:!mobile?`${G}22`:"transparent",color:!mobile?G:`${CR}55`}}>
          🖥 Desktop
        </button>
        <button onClick={()=>setMobile(true)}
          style={{background:mobile?`${G}22`:"transparent",color:mobile?G:`${CR}55`}}>
          📱 Mobile
        </button>
      </div>
    </div>
  );
}

/* ── MOBILE FRAME ── */
function MobileFrame({children}){
  return(
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",
      background:`radial-gradient(ellipse at center,${NM} 0%,${NAV} 70%)`,padding:24,overflow:"auto"}}>
      <div style={{width:375,minHeight:667,maxHeight:"calc(100vh - 130px)",
        background:NAV,borderRadius:40,border:`2px solid ${G}33`,
        boxShadow:`0 32px 80px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.04),0 0 40px ${G}18`,
        display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",flexShrink:0}}>
        {/* notch */}
        <div style={{height:36,display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"0 24px",flexShrink:0}}>
          <span className="mono" style={{fontSize:10,color:`${CR}66`}}>9:41</span>
          <div style={{width:90,height:18,background:NAV,borderRadius:12,border:`1px solid ${G}22`}}/>
          <span style={{fontSize:10,color:`${CR}66`}}>●●●</span>
        </div>
        <div style={{flex:1,overflow:"hidden"}}>{children}</div>
      </div>
    </div>
  );
}

/* ── SKELETON LOADER ── */
function SkeletonFeed(){
  return(
    <div style={{padding:24,display:"flex",flexDirection:"column",gap:16}}>
      <div style={{marginBottom:8}}>
        <div className="skeleton" style={{width:160,height:10,marginBottom:8}}/>
        <div className="skeleton" style={{width:220,height:22}}/>
      </div>
      {[1,2,3].map(i=>(
        <div key={i} className="card" style={{padding:24}}>
          <div style={{display:"flex",gap:14,marginBottom:16}}>
            <div className="skeleton" style={{width:56,height:56,borderRadius:"50%",flexShrink:0}}/>
            <div style={{flex:1,display:"flex",justifyContent:"space-between"}}>
              <div>
                <div className="skeleton" style={{width:140,height:14,marginBottom:8}}/>
                <div className="skeleton" style={{width:180,height:10,marginBottom:6}}/>
                <div className="skeleton" style={{width:100,height:9}}/>
              </div>
              <div className="skeleton" style={{width:48,height:48,borderRadius:8}}/>
            </div>
          </div>
          <div className="skeleton" style={{width:"100%",height:80,borderRadius:10,marginBottom:12}}/>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <div className="skeleton" style={{width:90,height:24,borderRadius:20}}/>
            <div className="skeleton" style={{width:120,height:24,borderRadius:20}}/>
          </div>
          <div className="skeleton" style={{width:"100%",height:38,borderRadius:8}}/>
        </div>
      ))}
    </div>
  );
}

/* ── ERROR TOAST ── */
function ErrorToast({msg,onClose}){
  return(
    <div className="fade-up" style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
      background:`linear-gradient(135deg,${NM},${NL})`,border:`1px solid ${G}44`,borderRadius:12,
      padding:"14px 20px",display:"flex",alignItems:"center",gap:14,zIndex:500,
      boxShadow:`0 8px 32px rgba(0,0,0,.4),0 0 20px ${G}18`,maxWidth:480}}>
      <div style={{width:32,height:32,background:`${G}18`,borderRadius:"50%",
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🚧</div>
      <div style={{flex:1}}>
        <div style={{fontSize:12,color:G,letterSpacing:".1em",textTransform:"uppercase",marginBottom:3}}>Temporary Roadblock</div>
        <div style={{fontSize:13,color:CR,lineHeight:1.5}}>{msg}</div>
      </div>
      <button onClick={onClose} style={{background:"none",border:"none",color:`${CR}55`,cursor:"pointer",fontSize:18,padding:"0 4px"}}>×</button>
    </div>
  );
}

/* ══════════════ TALENT FLOW ══════════════ */
const TSTEPS=["landing","welcome","passion","growth","aspiration","character","dashboard"];
const TLBLS=["Landing","Welcome","Passion","Growth","Aspiration","Character","Dashboard"];

const NWA_STORIES=[
  "A former Walmart Service Manager is now Operations Lead at Heartland Labs.",
  "Recognized at The 1907 in Rogers — now a Supply Chain Analyst at Tyson Foods.",
  "Spotted at Onyx HQ in Bentonville — now District Manager at Simmons Foods.",
  "Met at The Ledger in Bentonville — now Regional Director at J.B. Hunt.",
  "A Rogers shift lead earning $32k is now a People Ops Manager at $68k.",
  "Vouched at Airship at Coler — landed an Operations role in 11 days.",
];

function TalentMobileContent({step,dir,animKey,ans,setAns,showQuote,traits,successStories,next,prev,go}){
  const cur=TSTEPS[step];
  const cls=dir==="right"?"slide-right":"slide-left";
  const tickRef=useRef();

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:NAV,
      backgroundImage:"url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E\")"}}>
      {/* progress bar */}
      <div style={{padding:"12px 20px 0",flexShrink:0}}>
        <div style={{display:"flex",gap:4}}>
          {TSTEPS.map((_,i)=>(
            <div key={i} style={{flex:1,height:2,borderRadius:2,background:i<=step?`linear-gradient(90deg,${G},${GL})`:NL,transition:"background .3s"}}/>
          ))}
        </div>
        <div style={{fontSize:10,color:`${CR}44`,marginTop:6,letterSpacing:".1em"}}>{TLBLS[step].toUpperCase()}</div>
      </div>

      <div key={animKey} className={`${cls} scroll-y`} style={{flex:1,padding:"20px 20px 0",overflowX:"hidden"}}>

        {cur==="landing" && <MobileLanding next={next} traits={traits}/>}
        {cur==="welcome" && <MobileWelcome next={next} prev={prev} showQuote={showQuote}/>}
        {cur==="passion" && (
          <MobileTextStep step="2" title="What do you love doing?" hint="Think about moments when time disappears."
            placeholder="I love building teams from scratch..." value={ans.passion}
            onChange={v=>setAns(a=>({...a,passion:v}))} next={next} prev={prev} minLen={20}/>
        )}
        {cur==="growth" && (
          <MobileTextStep step="3" title="What would you change?" hint="About your current role — no filter."
            placeholder="I want a seat at the table where strategy gets made..." value={ans.growth}
            onChange={v=>setAns(a=>({...a,growth:v}))} next={next} prev={prev}/>
        )}
        {cur==="aspiration" && (
          <MobileTextStep step="4" title="Where do you want to be in 3 years?" hint="Don't be modest."
            placeholder="Leading a regional operations team..." value={ans.aspiration}
            onChange={v=>setAns(a=>({...a,aspiration:v}))} next={next} prev={prev}/>
        )}
        {cur==="character" && <MobileCharacter traits={traits} next={next} prev={prev}/>}
        {cur==="dashboard" && <MobileDashboard stories={successStories}/>}
      </div>

      {/* thumb-zone nav */}
      {cur!=="landing" && cur!=="dashboard" && (
        <div style={{padding:"12px 20px 20px",flexShrink:0,borderTop:`1px solid ${G}11`}}>
          <div style={{display:"flex",gap:10}}>
            {step>0&&<button className="btn-ghost" onClick={prev} style={{padding:"14px 0",borderRadius:12,flex:1,fontSize:12}}>← Back</button>}
            <button className="btn-gold" onClick={next}
              disabled={cur==="passion"&&ans.passion.length<20}
              style={{padding:"15px 0",borderRadius:12,flex:step>0?2:1,fontSize:12,
                boxShadow:`0 4px 20px ${G}44`}}>
              {cur==="character"?"Activate My Profile →":"Continue →"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function MobileLanding({next}){
  const ref=useRef();
  const tilt=useTilt(ref);
  return(
    <div style={{textAlign:"center",paddingBottom:20}}>
      <div style={{width:64,height:64,background:`linear-gradient(135deg,${G}22,${G}44)`,borderRadius:"50%",
        margin:"8px auto 16px",border:`1px solid ${G}55`,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <img src="https://i.pravatar.cc/50?img=12" style={{width:52,height:52,borderRadius:"50%"}} alt="scout"/>
      </div>
      <div style={{fontSize:10,letterSpacing:".18em",textTransform:"uppercase",color:G,marginBottom:10}}>James Whitfield · SVP, Walmart</div>
      <h1 style={{fontFamily:"Cormorant Garamond",fontSize:30,fontWeight:600,lineHeight:1.2,color:CR,marginBottom:14}}>
        Maria, you're ready for<br/><span className="gold-text">something bigger.</span>
      </h1>
      <p style={{color:`${CR}77`,fontSize:13,lineHeight:1.7,marginBottom:20}}>
        James has issued you a private Next Lane Golden Ticket — reserved for talent that doesn't show up on a résumé.
      </p>
      <div ref={ref} {...tilt} style={{background:`linear-gradient(135deg,${NL},${NM})`,
        border:`1px solid ${G}66`,borderRadius:14,padding:"16px 18px",marginBottom:20,
        display:"flex",alignItems:"center",gap:14,textAlign:"left",cursor:"default",
        transition:"transform .15s ease,box-shadow .15s ease"}}>
        <div style={{width:44,height:44,background:`linear-gradient(135deg,${GD},${G},${GL})`,borderRadius:9,
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,
          boxShadow:`0 4px 14px ${G}44`}}>🎫</div>
        <div>
          <div style={{fontSize:10,letterSpacing:".12em",textTransform:"uppercase",color:G,marginBottom:2}}>Golden Ticket · NWA 2025</div>
          <div style={{fontFamily:"Cormorant Garamond",fontSize:17,color:CR}}>Maria Gutierrez</div>
          <div className="mono" style={{fontSize:9,color:`${G}88`,marginTop:2}}>NL-NWA-2025-0047</div>
        </div>
      </div>
      <button className="btn-gold" onClick={next}
        style={{padding:"16px 0",borderRadius:14,fontSize:13,width:"100%",
          boxShadow:`0 6px 24px ${G}44`}}>
        Accept My Golden Ticket →
      </button>
    </div>
  );
}

function MobileWelcome({next,prev,showQuote}){
  return(
    <div style={{paddingBottom:20}}>
      <div style={{fontSize:10,letterSpacing:".18em",textTransform:"uppercase",color:G,marginBottom:8}}>Step 1 of 5</div>
      <h2 style={{fontFamily:"Cormorant Garamond",fontSize:28,color:CR,marginBottom:12}}>Welcome to the lane.</h2>
      <p style={{color:`${CR}77`,fontSize:13,lineHeight:1.75,marginBottom:20}}>
        Next Lane isn't a job board. It's a private career accelerator powered by leaders who've seen what you're capable of — before you proved it on paper.
      </p>
      <div style={{background:`${G}0D`,border:`1px solid ${G}33`,borderRadius:12,padding:18,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <img src="https://i.pravatar.cc/28?img=12" style={{width:26,height:26,borderRadius:"50%",border:`1px solid ${G}66`}} alt="scout"/>
          <div>
            <div style={{fontSize:12,color:GL,fontWeight:600}}>James Whitfield</div>
            <div style={{fontSize:10,color:`${CR}55`}}>SVP Operations · Walmart</div>
          </div>

function TalentFlow({mobile}){
  const [step,setStep]=useState(0);
  const [dir,setDir]=useState("right");
  const [ans,setAns]=useState({passion:"",growth:"",aspiration:""});
  const [showQuote,setShowQuote]=useState(false);
  const [animKey,setAnimKey]=useState(0);
  const traits=[
    {key:"Coachability",icon:"🧠",desc:"Adapts fast, listens deeply",active:true},
    {key:"Emotional Intelligence",icon:"💡",desc:"Reads rooms, builds loyalty",active:true},
    {key:"Motivation",icon:"🔥",desc:"Driven to outperform",active:false},
    {key:"Temperament",icon:"⚖️",desc:"Steady under pressure",active:false},
  ];

  const go=n=>{
    setDir(n>step?"right":"left");setStep(n);setAnimKey(k=>k+1);
    if(TSTEPS[n]==="welcome"){setShowQuote(false);setTimeout(()=>setShowQuote(true),1600);}
  };
  const next=()=>go(Math.min(step+1,TSTEPS.length-1));
  const prev=()=>go(Math.max(step-1,0));

  const props={step,dir,animKey,ans,setAns,showQuote,traits,successStories:NWA_STORIES,next,prev,go};
  if(mobile) return <TalentMobileContent {...props}/>;
  return <TalentDesktop {...props}/>;
}

            {expanded===t.id&&(
              <div className="fade-up" style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${G}22`}}>
                <div style={{fontSize:10,letterSpacing:".1em",textTransform:"uppercase",color:`${CR}44`,marginBottom:8}}>Work History</div>
                {[{ti:"General Manager",co:"Outback Steakhouse, Houston TX",y:"2019–2024"},{ti:"Assistant Manager",co:"Darden Restaurants, Houston TX",y:"2016–2019"}].map(w=>(
                  <div key={w.ti} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:`${CR}66`,marginBottom:5,flexWrap:"wrap",gap:4}}>
                    <span><span style={{color:CR,fontWeight:500}}>{w.ti}</span> · {w.co}</span>
                    <span style={{color:`${CR}44`}}>{w.y}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );

  const metricsContent=(
    <div className="fade-up">
      <div style={{marginBottom:22}}>
        <div style={{fontSize:10,letterSpacing:".18em",textTransform:"uppercase",color:G,marginBottom:6}}>Efficiency Dashboard</div>
        <h2 style={{fontFamily:"Cormorant Garamond",fontSize:mobile?26:32,color:CR}}>Speed-to-Hire Analysis</h2>
      </div>
      {/* ── COMPARATIVE TIMELINE ── */}
      <div className="card" style={{padding:24,marginBottom:18}}>
        <div style={{fontSize:10,letterSpacing:".14em",textTransform:"uppercase",color:G,marginBottom:20}}>The Lane vs. Traditional Hiring</div>
        <svg viewBox="0 0 560 140" style={{width:"100%",height:"auto",overflow:"visible"}}>
          <defs>
            <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor={GD}/>
              <stop offset="50%" stopColor={G}/>
              <stop offset="100%" stopColor={GL}/>
            </linearGradient>
          </defs>
          {/* Labels left */}
          <text x="0" y="38"  fill={`${CR}88`} fontSize="11" fontFamily="DM Sans">Traditional</text>
          <text x="0" y="108" fill={G}         fontSize="11" fontFamily="DM Sans">Next Lane</text>

          {/* Traditional path — tangled gray */}
          <path d="M100,30 C130,10 110,50 160,30 C200,15 190,55 240,30 C280,10 270,55 310,28 C350,5  340,55 380,28 C420,5  410,55 450,30 C480,18 470,42 520,30"
            fill="none" stroke={`${CR}33`} strokeWidth="2.5" strokeLinecap="round"/>
          {/* dashes marking struggle */}
          <text x="524" y="34" fill={`${CR}55`} fontSize="10" fontFamily="DM Sans">52 days</text>

          {/* Milestone markers on traditional */}
          {[160,240,320,400].map((x,i)=>(
            <circle key={i} cx={x} cy={[30,30,28,28][i]} r="4" fill={`${CR}22`} stroke={`${CR}44`} strokeWidth="1"/>
          ))}

          {/* Next Lane — straight gold lane */}
          <line x1="100" y1="100" x2="516" y2="100" stroke={`${NAV}`} strokeWidth="8"/>
          <line x1="100" y1="100" x2="516" y2="100"
            stroke="url(#goldLine)" strokeWidth="3" strokeLinecap="round"
            strokeDasharray="600" strokeDashoffset="600"
            style={{animation:"laneDrawDesktop 1.8s ease forwards .4s"}}/>
          {/* lane end arrow */}
          <polygon points="516,94 530,100 516,106" fill={GL}/>
          <text x="533" y="104" fill={G} fontSize="10" fontFamily="DM Sans">12 days</text>

          {/* Start marker */}
          <circle cx="100" cy="30"  r="5" fill={`${CR}44`}/>
          <circle cx="100" cy="100" r="5" fill={G} style={{filter:`drop-shadow(0 0 4px ${G})`}}/>
          <text x="70" y="68" fill={`${CR}44`} fontSize="9" fontFamily="DM Sans" textAnchor="middle">Start</text>
          <line x1="70" x2="70" y1="72" y2="96" stroke={`${CR}22`} strokeWidth="1"/>

          {/* Axis label */}
          <text x="300" y="130" fill={`${CR}33`} fontSize="9" fontFamily="DM Sans" textAnchor="middle">Time →</text>
        </svg>
        <div style={{display:"flex",gap:20,marginTop:8,justifyContent:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:20,height:2,background:`${CR}33`}}/>
            <span style={{fontSize:10,color:`${CR}55`}}>Traditional (52 days avg.)</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:20,height:2,background:`linear-gradient(90deg,${G},${GL})`}}/>
            <span style={{fontSize:10,color:GL}}>Next Lane (12 days avg.)</span>
          </div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:14,marginBottom:18}}>
        {[
          {l:"Avg. Time-to-Hire",  nl:"12 days",trad:"52 days",gain:"76% faster" },
          {l:"Cost Per Hire",      nl:"$420",    trad:"$4,200+",gain:"10× cheaper"},
          {l:"First-Year Retention",nl:"87%",    trad:"58%",    gain:"+29pts"     },
          {l:"Hire Success Rate",  nl:"78%",     trad:"18%",    gain:"4× better"  },
        ].map(m=>(
          <div key={m.l} className="card" style={{padding:20}}>
            <div style={{fontSize:10,letterSpacing:".1em",textTransform:"uppercase",color:`${CR}55`,marginBottom:12}}>{m.l}</div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <div>
                <div style={{fontSize:9,color:`${CR}44`,marginBottom:2}}>Next Lane</div>
                <div className="mono" style={{fontSize:26,color:G,lineHeight:1}}>{m.nl}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:9,color:`${CR}44`,marginBottom:2}}>Traditional</div>
                <div className="mono" style={{fontSize:26,color:`${CR}44`,lineHeight:1,textDecoration:"line-through"}}>{m.trad}</div>
              </div>
            </div>
            <div style={{background:`${G}15`,border:`1px solid ${G}33`,borderRadius:5,padding:"5px 10px",textAlign:"center",fontSize:11,color:G,fontWeight:600}}>{m.gain} efficiency gain</div>
          </div>
        ))}
      </div>

      <div className="card" style={{padding:22}}>
        <div style={{fontSize:10,letterSpacing:".14em",textTransform:"uppercase",color:G,marginBottom:16}}>NWA Pilot — Pipeline</div>
        <div style={{display:"flex",gap:0,alignItems:"center"}}>
          {[{l:"Scouts",v:12,c:G},{l:"Nominated",v:34,c:GL},{l:"Active",v:28,c:"#A8C5E8"},{l:"Interviews",v:9,c:"#7FB3D3"},{l:"Hired",v:7,c:"#4CAF50"}].map((s,i,arr)=>(
            <div key={s.l} style={{flex:1}}>
              <div style={{textAlign:"center",paddingBottom:7}}>
                <div className="mono" style={{fontSize:22,color:s.c}}>{s.v}</div>
                <div style={{fontSize:9,color:`${CR}55`,lineHeight:1.3}}>{s.l}</div>
              </div>
              <div style={{height:3,background:s.c,opacity:.75,borderRadius:i===0?"3px 0 0 3px":i===arr.length-1?"0 3px 3px 0":0}}/>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  if(mobile){
    return(
      <div style={{height:"100%",display:"flex",flexDirection:"column",background:NAV,backgroundImage:"url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E\")"}}>
        <div style={{display:"flex",borderBottom:`1px solid ${G}11`,flexShrink:0}}>
          {[{id:"loading",l:"Feed"},{id:"metrics",l:"Metrics"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id==="loading"?"loading":"metrics")}
              style={{flex:1,padding:"10px 4px",border:"none",cursor:"pointer",fontFamily:"DM Sans",
                fontSize:10,fontWeight:500,letterSpacing:".06em",textTransform:"uppercase",
                background:(tab==="loading"||tab==="feed")&&t.id==="loading"?`${G}18`:tab==="metrics"&&t.id==="metrics"?`${G}18`:"transparent",
                color:(tab==="loading"||tab==="feed")&&t.id==="loading"?G:tab==="metrics"&&t.id==="metrics"?G:`${CR}55`,
                borderBottom:(tab==="loading"||tab==="feed")&&t.id==="loading"?`2px solid ${G}`:tab==="metrics"&&t.id==="metrics"?`2px solid ${G}`:"2px solid transparent",
                transition:"all .2s"}}>
              {t.l}
            </button>
          ))}
        </div>
        <div className="scroll-y" style={{flex:1,padding:16}}>
          {tab==="loading"&&<SkeletonFeed/>}
          {tab==="feed"&&feedContent}
          {tab==="metrics"&&metricsContent}
        </div>
      </div>
    );
  }

  return(
    <div style={{display:"flex",height:"calc(100vh - 58px)",overflow:"hidden"}}>
      <div style={{width:200,background:NM,borderRight:`1px solid ${G}22`,padding:"32px 0",flexShrink:0}}>
        <div style={{padding:"0 20px 22px",borderBottom:`1px solid ${G}11`}}>
          <div style={{fontSize:10,letterSpacing:".14em",color:`${CR}55`,textTransform:"uppercase",marginBottom:4}}>Recruiter Portal</div>
          <div style={{fontFamily:"Cormorant Garamond",fontSize:16,color:CR}}>Talent Acquisition</div>
        </div>
        {[{id:"loading",l:"Vetted Talent Feed"},{id:"metrics",l:"Efficiency Metrics"}].map(t=>(
          <div key={t.id} onClick={()=>setTab(t.id==="loading"?"loading":"metrics")}
            style={{padding:"11px 20px",cursor:"pointer",
              borderLeft:(tab==="loading"||tab==="feed")&&t.id==="loading"?`2px solid ${G}`:tab==="metrics"&&t.id==="metrics"?`2px solid ${G}`:"2px solid transparent",
              background:(tab==="loading"||tab==="feed")&&t.id==="loading"?`${G}11`:tab==="metrics"&&t.id==="metrics"?`${G}11`:"transparent",
              fontSize:12,fontWeight:600,color:(tab==="loading"||tab==="feed")&&t.id==="loading"?CR:tab==="metrics"&&t.id==="metrics"?CR:`${CR}55`,
              transition:"all .2s"}}>
            {t.l}
          </div>
        ))}
        <div style={{marginTop:"auto",padding:"16px 20px",borderTop:`1px solid ${G}11`}}>
          <div style={{fontSize:9,color:`${CR}33`,lineHeight:1.6}}>NWA Pilot<br/>Month 1 · Foundation Gate</div>
        </div>
      </div>
      <div className="scroll-y" style={{flex:1,padding:36}}>
        {tab==="loading"&&<SkeletonFeed/>}
        {tab==="feed"&&feedContent}
        {tab==="metrics"&&metricsContent}
      </div>
    </div>
  );
}

/* ══════════════ ROOT ══════════════ */
function App(){
  const [view,setView]=useState("talent");
  const [mobile,setMobile]=useState(false);
  const [error,setError]=useState(null);

  // simulate random network error demo
  useEffect(()=>{
    const t=setTimeout(()=>setError("We've hit a temporary roadblock in the lane. We're working to clear the path — stay with us."),8000);
    return()=>clearTimeout(t);
  },[]);

  const content=(
    <>
      {view==="talent"    && <TalentFlow    mobile={mobile}/>}
      {view==="scout"     && <ScoutFlow     mobile={mobile}/>}
      {view==="recruiter" && <RecruiterFlow mobile={mobile}/>}
    </>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <TopNav view={view} setView={setView} mobile={mobile} setMobile={setMobile}/>
      {mobile?(
        <MobileFrame>{content}</MobileFrame>
      ):(
        <div style={{flex:1,overflow:"hidden"}}>{content}</div>
      )}
      {error&&<ErrorToast msg={error} onClose={()=>setError(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
