<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Next Lane — Phase 2 Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%}
body{font-family:'DM Sans',sans-serif;background:#0B1628;color:white;overflow:hidden;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:#0B1628}
::-webkit-scrollbar-thumb{background:#C9A84C;border-radius:2px}

/* ── tokens ── */
/* WCAG-AA high-vis gold for small functional text: #D4A843 on #0B1628 = 4.6:1 */
/* Decorative foil gold kept for display: #C9A84C */

/* ── keyframes ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(44px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-44px)}to{opacity:1;transform:translateX(0)}}
@keyframes foilShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes igniteBtn{0%{filter:grayscale(1)opacity(.35)}55%{filter:grayscale(0)opacity(1)brightness(1.4)}100%{filter:grayscale(0)opacity(1)brightness(1)}}
@keyframes borderBleed{0%{box-shadow:0 0 0 0 rgba(201,168,76,0)}50%{box-shadow:0 0 0 7px rgba(201,168,76,.35),0 0 32px 4px rgba(201,168,76,.18)}100%{box-shadow:0 0 0 2px rgba(201,168,76,.18)}}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes typingPulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}}
@keyframes lightSweep{0%{left:-60%}100%{left:160%}}
@keyframes skeletonMove{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes laneDrawDesktop{0%{stroke-dashoffset:600}100%{stroke-dashoffset:0}}
@keyframes missionGlow{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}50%{box-shadow:0 0 24px 2px rgba(201,168,76,.12)}}

/* QR unbox sequence */
@keyframes scanLine{0%{top:0%}100%{top:100%}}
@keyframes cardReveal{0%{opacity:0;transform:scale(.85) rotateY(20deg)}60%{transform:scale(1.04) rotateY(-4deg)}100%{opacity:1;transform:scale(1) rotateY(0)}}
@keyframes goldRipple{0%{transform:scale(0);opacity:.9}100%{transform:scale(3.5);opacity:0}}
@keyframes envelopeOpen{0%{transform:scaleY(1);transform-origin:top}100%{transform:scaleY(0);transform-origin:top}}
@keyframes waveform{0%,100%{transform:scaleY(.2)}50%{transform:scaleY(1)}}
@keyframes privacyBlur{0%{filter:blur(0px)}100%{filter:blur(6px)}}
@keyframes radarDraw{0%{stroke-dashoffset:1000}100%{stroke-dashoffset:0}}

.fade-up{animation:fadeUp .42s ease forwards}
.fade-in{animation:fadeIn .5s ease forwards}
.slide-right{animation:slideRight .36s cubic-bezier(.25,.8,.25,1) forwards}
.slide-left{animation:slideLeft .36s cubic-bezier(.25,.8,.25,1) forwards}

.gold-text{
  background:linear-gradient(90deg,#8B6914 0%,#C9A84C 25%,#F0D980 50%,#C9A84C 75%,#8B6914 100%);
  background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:foilShimmer 4s linear infinite}
.btn-gold{
  background:linear-gradient(135deg,#8B6914 0%,#C9A84C 30%,#F0D980 55%,#C9A84C 80%,#8B6914 100%);
  background-size:250% auto;color:#0B1628;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  font-size:12px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s,background-position .4s}
.btn-gold::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);transform:skewX(-20deg)}
.btn-gold:hover:not(:disabled)::after{animation:lightSweep .55s ease}
.btn-gold:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 28px rgba(201,168,76,.4);background-position:right center}
.btn-gold:disabled{filter:grayscale(1);opacity:.35;cursor:not-allowed}
.btn-gold.ignited{animation:igniteBtn .65s ease forwards}
.btn-ghost{background:transparent;color:#D4A843;border:1px solid rgba(201,168,76,.35);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  font-size:11px;transition:border-color .2s,background .2s,transform .2s}
.btn-ghost:hover{border-color:#C9A84C;background:rgba(201,168,76,.07);transform:translateY(-1px)}
.card{background:#122040;border:1px solid rgba(201,168,76,.13);border-radius:12px}
.card-glow{transition:border-color .25s,box-shadow .25s}
.card-glow:hover{border-color:rgba(201,168,76,.36);box-shadow:0 0 32px rgba(201,168,76,.08)}
.glass-nav{background:rgba(11,22,40,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,.18)}
.stationery{background:rgba(245,240,232,.06)!important;border:1px solid rgba(245,240,232,.15)!important;
  color:#F5F0E8!important;font-family:'Cormorant Garamond',serif!important;font-size:16px!important;
  line-height:1.85!important;letter-spacing:.01em;transition:box-shadow .3s!important}
.stationery::placeholder{color:rgba(245,240,232,.22)!important;font-style:italic}
.stationery.ignite-border{animation:borderBleed .7s ease forwards}
.mono{font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
input{background:#1A2E55;border:1px solid rgba(201,168,76,.15);border-radius:8px;padding:12px 14px;
  color:#F5F0E8;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
input:focus{border-color:rgba(201,168,76,.55)}
input::placeholder{color:rgba(245,240,232,.28)}
.scroll-y{overflow-y:auto}
.typing-dot{width:7px;height:7px;border-radius:50%;background:#C9A84C;display:inline-block;margin:0 2px;animation:typingPulse 1.2s ease infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
.skeleton{background:linear-gradient(90deg,#122040 25%,#1A2E55 50%,#122040 75%);background-size:400% 100%;animation:skeletonMove 1.8s ease infinite;border-radius:8px}
.mission-pulse{animation:missionGlow 3s ease infinite}
.view-toggle{display:flex;background:rgba(18,32,64,.85);border:1px solid rgba(201,168,76,.22);border-radius:8px;overflow:hidden}
.view-toggle button{padding:6px 14px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;transition:all .2s}

/* waveform bars */
.wave-bar{width:3px;border-radius:2px;background:linear-gradient(180deg,#C9A84C,#8B6914);transform-origin:center;animation:waveform .8s ease infinite}

/* privacy shield */
.privacy-blur{animation:privacyBlur .4s ease forwards;filter:blur(6px);user-select:none}
.privacy-clear{filter:blur(0);transition:filter .4s ease}

/* meeting funnel steps */
.funnel-step{opacity:.4;transition:opacity .3s}
.funnel-step.active{opacity:1}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const G="#C9A84C",GL="#E8C97A",GD="#8B6914",GHV="#D4A843"; // GHV = high-visibility AA-compliant gold
const NAV="#0B1628",NM="#122040",NL="#1A2E55",CR="#F5F0E8";
const GRAIN=`url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")`;

/* ══ TILT HOOK ══ */
function useTilt(ref){
  const onMove=useCallback(e=>{
    if(!ref.current)return;
    const r=ref.current.getBoundingClientRect();
    const x=((e.clientX-r.left)/r.width-.5)*14,y=((e.clientY-r.top)/r.height-.5)*-14;
    ref.current.style.transform=`perspective(600px) rotateY(${x}deg) rotateX(${y}deg) scale(1.02)`;
    ref.current.style.boxShadow=`${-x*1.5}px ${y*1.2}px 38px rgba(201,168,76,.24)`;
  },[ref]);
  const onLeave=useCallback(()=>{
    if(!ref.current)return;
    ref.current.style.transform="perspective(600px) rotateY(0) rotateX(0) scale(1)";
    ref.current.style.boxShadow="none";
  },[ref]);
  return{onMouseMove:onMove,onMouseLeave:onLeave};
}

/* ══ TOP NAV ══ */
function TopNav({view,setView,mobile,setMobile}){
  const tabs=[{id:"qr",label:"QR Unbox"},{id:"talent",label:"Talent Journey"},{id:"scout",label:"Scout Center"},{id:"recruiter",label:"Recruiter Feed"}];
  return(
    <div className="glass-nav" style={{padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,position:"sticky",top:0,zIndex:200,flexShrink:0,gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <div style={{width:26,height:26,background:`linear-gradient(135deg,${GD},${G},${GL})`,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 10px ${G}44`}}>
          <span style={{color:NAV,fontSize:13,fontWeight:700,fontFamily:"Cormorant Garamond"}}>N</span>
        </div>
        <span style={{fontFamily:"Cormorant Garamond",fontSize:16,fontWeight:600,letterSpacing:".12em",color:CR,whiteSpace:"nowrap"}}>NEXT LANE</span>
      </div>
      <div style={{display:"flex",gap:2,flexWrap:"wrap",justifyContent:"center"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setView(t.id)}
            style={{padding:"5px 11px",borderRadius:6,border:"none",cursor:"pointer",fontFamily:"DM Sans",fontSize:11,fontWeight:500,letterSpacing:".05em",transition:"all .2s",
              background:view===t.id?`linear-gradient(135deg,${GD},${G},${GL})`:"transparent",
              color:view===t.id?NAV:`${CR}88`,boxShadow:view===t.id?`0 3px 10px ${G}44`:"none",whiteSpace:"nowrap"}}>
            {t.label}
          </button>
        ))}
      </div>
      <div className="view-toggle" style={{flexShrink:0}}>
        <button onClick={()=>setMobile(false)} style={{background:!mobile?`${G}22`:"transparent",color:!mobile?G:`${CR}55`}}>🖥</button>
        <button onClick={()=>setMobile(true)}  style={{background: mobile?`${G}22`:"transparent",color: mobile?G:`${CR}55`}}>📱</button>
      </div>
    </div>
  );
}

/* ══ MOBILE FRAME ══ */
function MobileFrame({children}){
  return(
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at center,${NM} 0%,${NAV} 70%)`,padding:16,overflow:"auto"}}>
      <div style={{width:375,minHeight:620,maxHeight:"calc(100vh - 100px)",background:NAV,borderRadius:38,border:`2px solid ${G}33`,boxShadow:`0 28px 72px rgba(0,0,0,.6),0 0 40px ${G}18`,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",flexShrink:0}}>
        <div style={{height:32,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 22px",flexShrink:0}}>
          <span className="mono" style={{fontSize:9,color:`${CR}55`}}>9:41</span>
          <div style={{width:80,height:16,background:NAV,borderRadius:10,border:`1px solid ${G}22`}}/>
          <span style={{fontSize:9,color:`${CR}55`}}>●●●</span>
        </div>
        <div style={{flex:1,overflow:"hidden"}}>{children}</div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   QR UNBOXING SEQUENCE
══════════════════════════════════════════════ */
function QRUnboxFlow({mobile}){
  const [phase,setPhase]=useState("scan"); // scan → ripple → envelope → reveal → landing
  const tiltRef=useRef();
  const tilt=useTilt(tiltRef);

  useEffect(()=>{
    if(phase==="scan"){const t=setTimeout(()=>setPhase("ripple"),2200);return()=>clearTimeout(t);}
    if(phase==="ripple"){const t=setTimeout(()=>setPhase("envelope"),900);return()=>clearTimeout(t);}
    if(phase==="envelope"){const t=setTimeout(()=>setPhase("reveal"),1100);return()=>clearTimeout(t);}
    if(phase==="reveal"){const t=setTimeout(()=>setPhase("landing"),1000);return()=>clearTimeout(t);}
  },[phase]);

  const content=(
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,position:"relative",overflow:"hidden",background:NAV,backgroundImage:GRAIN}}>

      {/* ── PHASE: SCAN ── */}
      {phase==="scan"&&(
        <div className="fade-in" style={{textAlign:"center"}}>
          <div style={{fontSize:11,letterSpacing:".2em",textTransform:"uppercase",color:GHV,marginBottom:20}}>Scanning Your Golden Ticket</div>
          {/* QR mock */}
          <div style={{width:180,height:180,margin:"0 auto 24px",position:"relative",borderRadius:16,border:`2px solid ${G}44`,padding:16,background:NM}}>
            {/* QR grid simulation */}
            <svg viewBox="0 0 120 120" style={{width:"100%",height:"100%",opacity:.7}}>
              {/* corners */}
              <rect x="4" y="4" width="28" height="28" rx="4" fill="none" stroke={G} strokeWidth="3"/>
              <rect x="8" y="8" width="20" height="20" rx="2" fill={G} opacity=".6"/>
              <rect x="88" y="4" width="28" height="28" rx="4" fill="none" stroke={G} strokeWidth="3"/>
              <rect x="92" y="8" width="20" height="20" rx="2" fill={G} opacity=".6"/>
              <rect x="4" y="88" width="28" height="28" rx="4" fill="none" stroke={G} strokeWidth="3"/>
              <rect x="8" y="92" width="20" height="20" rx="2" fill={G} opacity=".6"/>
              {/* data modules */}
              {[44,50,56,62,68,74,80].map(x=>[44,50,56,62,68,74,80].map(y=>(
                Math.random()>.5&&<rect key={`${x}${y}`} x={x} y={y} width="5" height="5" fill={G} opacity=".5"/>
              )))}
              {/* finder pattern center */}
              <rect x="54" y="54" width="12" height="12" rx="1" fill={G} opacity=".8"/>
            </svg>
            {/* scan line */}
            <div style={{position:"absolute",left:8,right:8,height:2,background:`linear-gradient(90deg,transparent,${G},transparent)`,animation:"scanLine 1.5s ease infinite",top:8,boxShadow:`0 0 8px ${G}`}}/>
          </div>
          <p style={{color:`${CR}66`,fontSize:13,lineHeight:1.7}}>Hold your Golden Ticket card<br/>up to the camera…</p>
          {/* simulate after 1s */}
          <button className="btn-ghost" onClick={()=>setPhase("ripple")} style={{marginTop:20,padding:"10px 24px",borderRadius:8,fontSize:11}}>Simulate Scan →</button>
        </div>
      )}

      {/* ── PHASE: RIPPLE ── */}
      {phase==="ripple"&&(
        <div className="fade-in" style={{textAlign:"center",position:"relative"}}>
          <div style={{width:120,height:120,margin:"0 auto",position:"relative"}}>
            {[0,1,2].map(i=>(
              <div key={i} style={{position:"absolute",inset:0,borderRadius:"50%",border:`2px solid ${G}`,animation:`goldRipple 1.2s ease ${i*.3}s forwards`,opacity:0}}/>
            ))}
            <div style={{width:"100%",height:"100%",borderRadius:"50%",background:`linear-gradient(135deg,${GD},${G},${GL})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,boxShadow:`0 0 40px ${G}66`}}>🎫</div>
          </div>
          <div style={{marginTop:24,fontFamily:"Cormorant Garamond",fontSize:22,color:CR}}>Golden Ticket Recognized</div>
        </div>
      )}

      {/* ── PHASE: ENVELOPE ── */}
      {phase==="envelope"&&(
        <div className="fade-in" style={{textAlign:"center"}}>
          <div style={{width:240,height:160,margin:"0 auto",position:"relative"}}>
            {/* envelope body */}
            <div style={{width:"100%",height:"100%",background:`linear-gradient(135deg,${NL},${NM})`,border:`1px solid ${G}55`,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
              {/* wax seal */}
              <div style={{width:60,height:60,borderRadius:"50%",background:`linear-gradient(135deg,${GD},${G},${GL})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,boxShadow:`0 0 20px ${G}66`}}>N</div>
              {/* envelope flap opening */}
              <div style={{position:"absolute",top:0,left:0,right:0,height:"50%",background:`linear-gradient(135deg,${NL},${NM})`,borderBottom:`1px solid ${G}44`,transformOrigin:"top",animation:"envelopeOpen .8s ease .2s forwards",clipPath:"polygon(0 0,50% 55%,100% 0)"}}/>
            </div>
            {/* letter rising */}
            <div style={{position:"absolute",left:16,right:16,bottom:0,height:100,background:CR,borderRadius:"6px 6px 0 0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",animation:"fadeUp .6s ease .8s both",color:NAV,padding:12}}>
              <div style={{fontSize:9,letterSpacing:".15em",textTransform:"uppercase",color:GD,marginBottom:4}}>GOLDEN TICKET</div>
              <div style={{fontFamily:"Cormorant Garamond",fontSize:14,fontWeight:600,color:NAV,textAlign:"center"}}>Exclusively for Maria Gutierrez</div>
            </div>
          </div>
        </div>
      )}

      {/* ── PHASE: REVEAL ── */}
      {phase==="reveal"&&(
        <div style={{textAlign:"center",animation:"cardReveal .9s cubic-bezier(.34,1.56,.64,1) forwards"}}>
          <div style={{fontFamily:"Cormorant Garamond",fontSize:28,color:CR,marginBottom:8}}>
            A message<br/>from <span className="gold-text">James.</span>
          </div>
        </div>
      )}

      {/* ── PHASE: LANDING ── */}
      {phase==="landing"&&(
        <div className="fade-up" style={{maxWidth:400,width:"100%",textAlign:"center"}}>
          <div style={{width:68,height:68,background:`${G}22`,borderRadius:"50%",margin:"0 auto 18px",border:`1px solid ${G}55`,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <img src="https://i.pravatar.cc/52?img=12" style={{width:52,height:52,borderRadius:"50%"}} alt="scout"/>
          </div>
          <div style={{fontSize:10,letterSpacing:".18em",textTransform:"uppercase",color:GHV,marginBottom:10}}>James Whitfield · SVP Operations, Walmart</div>
          <h1 style={{fontFamily:"Cormorant Garamond",fontSize:mobile?32:40,fontWeight:600,lineHeight:1.15,color:CR,marginBottom:14}}>
            Maria, James thinks<br/>you're ready for<br/><span className="gold-text">something bigger.</span>
          </h1>
          <p style={{color:`${CR}77`,fontSize:13,lineHeight:1.75,marginBottom:24}}>He has issued you a Next Lane Golden Ticket — a private invitation reserved for talent that doesn't show up on a résumé.</p>
          <div ref={tiltRef} {...tilt} style={{background:`linear-gradient(135deg,${NL},${NM})`,border:`1px solid ${G}66`,borderRadius:14,padding:"16px 20px",marginBottom:22,display:"flex",alignItems:"center",gap:14,textAlign:"left",cursor:"default",transition:"transform .15s,box-shadow .15s"}}>
            <div style={{width:44,height:44,background:`linear-gradient(135deg,${GD},${G},${GL})`,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,boxShadow:`0 4px 14px ${G}44`}}>🎫</div>
            <div>
              <div style={{fontSize:9,letterSpacing:".14em",textTransform:"uppercase",color:GHV,marginBottom:2}}>Golden Ticket · NWA Cohort 2025</div>
              <div style={{fontFamily:"Cormorant Garamond",fontSize:18,color:CR}}>Exclusively for Maria Gutierrez</div>
              <div className="mono" style={{fontSize:9,color:`${G}88`,marginTop:2}}>NL-NWA-2025-0047</div>
            </div>
          </div>
          <button className="btn-gold" onClick={()=>setPhase("scan")} style={{padding:"14px 0",borderRadius:12,fontSize:12,width:"100%",boxShadow:`0 6px 24px ${G}44`}}>Accept My Golden Ticket →</button>
          <button className="btn-ghost" onClick={()=>setPhase("scan")} style={{padding:"10px 0",borderRadius:12,fontSize:11,width:"100%",marginTop:8}}>↺ Replay Unboxing</button>
        </div>
      )}
    </div>
  );
  if(mobile) return content;
  return(
    <div style={{display:"flex",height:"calc(100vh - 56px)",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 60% 40%,${NM} 0%,${NAV} 70%)`,backgroundImage:GRAIN}}>
      <div style={{maxWidth:560,width:"100%",padding:32}}>
        {/* phase stepper */}
        <div style={{display:"flex",gap:4,marginBottom:28,alignItems:"center",justifyContent:"center"}}>
          {["scan","ripple","envelope","reveal","landing"].map((p,i,arr)=>(
            <React.Fragment key={p}>
              <div onClick={()=>setPhase(p)} style={{cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:phase===p?G:p==="scan"||arr.indexOf(p)<=arr.indexOf(phase)?`${G}55`:`${CR}22`,transition:"all .3s"}}/>
                <span style={{fontSize:9,color:phase===p?GHV:`${CR}33`,letterSpacing:".1em",textTransform:"uppercase"}}>{p}</span>
              </div>
              {i<arr.length-1&&<div style={{width:20,height:1,background:`${G}22`,marginBottom:14}}/>}
            </React.Fragment>
          ))}
        </div>

/* ══════════════════════════════════════════════
   CHARACTER RADAR CHART
══════════════════════════════════════════════ */
function RadarChart({scores,size=140,name}){
  // scores: {coachability, eq, motivation, temperament} 0-100
  const cx=size/2,cy=size/2,r=size*0.38;
  const traits=["Coachability","EQ","Motivation","Temperament"];
  const vals=[scores.coachability,scores.eq,scores.motivation,scores.temperament].map(v=>v/100);
  const angle=(i)=>(i/4)*Math.PI*2 - Math.PI/2;
  const pt=(i,scale=1)=>{
    const a=angle(i);
    return{x:cx+Math.cos(a)*r*scale,y:cy+Math.sin(a)*r*scale};
  };
  const polyPoints=vals.map((v,i)=>{const p=pt(i,v);return`${p.x},${p.y}`}).join(" ");
  // label positions
  const labelPts=traits.map((_,i)=>pt(i,1.28));

  return(
    <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size,overflow:"visible"}}>
      {/* grid rings */}
      {[.25,.5,.75,1].map(s=>(
        <polygon key={s} points={[0,1,2,3].map(i=>{const p=pt(i,s);return`${p.x},${p.y}`}).join(" ")}
          fill="none" stroke={`${G}${s===1?"44":"22"}`} strokeWidth={s===1?"1":"0.5"}/>
      ))}
      {/* axes */}
      {[0,1,2,3].map(i=>{const p=pt(i);return<line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke={`${G}22`} strokeWidth=".5"/>})}
      {/* filled area */}
      <polygon points={polyPoints} fill={`${G}22`} stroke={G} strokeWidth="1.5"
        strokeDasharray="1000" strokeDashoffset="1000" style={{animation:"radarDraw 1.2s ease forwards"}}/>
      {/* data points */}
      {vals.map((v,i)=>{const p=pt(i,v);return<circle key={i} cx={p.x} cy={p.y} r="3" fill={G} style={{filter:`drop-shadow(0 0 4px ${G})`}}/>})}
      {/* labels */}
      {labelPts.map((p,i)=>(
        <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle"
          fill={`${CR}88`} fontSize="8" fontFamily="DM Sans">{traits[i]}</text>
      ))}
    </svg>
  );
}

          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3,height:48,marginBottom:20}}>
            {bars.map(i=>(
              <div key={i} className="wave-bar" style={{height:`${20+Math.random()*28}px`,animationDelay:`${i*.05}s`,animationDuration:`${0.6+Math.random()*.4}s`}}/>

  const metricsContent=(

            <linearGradient id="goldLine2" x1="0%" y1="0%" x2="100%" y2="0%">

            </linearGradient>
          </defs>
          <text x="0" y="36" fill={`${CR}77`} fontSize="11" fontFamily="DM Sans">Traditional</text>
          <text x="0" y="106" fill={G} fontSize="11" fontFamily="DM Sans">Next Lane</text>
          <path d="M100,28 C130,8 110,48 160,28 C200,12 190,52 240,28 C280,8 270,52 310,26 C350,4 340,52 380,26 C420,4 410,52 450,28 C480,16 470,40 520,28"
            fill="none" stroke={`${CR}28`} strokeWidth="2.5" strokeLinecap="round"/>

          <circle cx="100" cy="28" r="4" fill={`${CR}33`}/><circle cx="100" cy="100" r="5" fill={G} style={{filter:`drop-shadow(0 0 4px ${G})`}}/>

      </div>
      <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12,marginBottom:16}}>
        {[{l:"Time-to-Hire",nl:"12 days",trad:"52 days",gain:"76% faster"},{l:"Cost Per Hire",nl:"$420",trad:"$4,200+",gain:"10× cheaper"},{l:"First-Year Retention",nl:"87%",trad:"58%",gain:"+29pts"},{l:"Hire Success Rate",nl:"78%",trad:"18%",gain:"4× better"}].map(m=>(
          <div key={m.l} className="card" style={{padding:18}}>

            <div style={{background:`${G}15`,border:`1px solid ${G}33`,borderRadius:5,padding:"5px 10px",textAlign:"center",fontSize:11,color:G,fontWeight:600}}>{m.gain} efficiency gain</div>
          </div>
        ))}
      </div>
    </div>
  );

  const inner=(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:NAV,backgroundImage:GRAIN}}>
      {mobile&&(
        <div style={{display:"flex",borderBottom:`1px solid ${G}11`,flexShrink:0}}>
          {[{id:"loading",l:"Feed"},{id:"metrics",l:"Metrics"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:"10px 4px",border:"none",cursor:"pointer",fontFamily:"DM Sans",fontSize:10,fontWeight:500,letterSpacing:".06em",textTransform:"uppercase",
                background:(tab==="loading"||tab==="feed")&&t.id==="loading"||tab===t.id?`${G}18`:"transparent",
                color:(tab==="loading"||tab==="feed")&&t.id==="loading"||tab===t.id?G:`${CR}55`,

        {tab==="loading"&&<div style={{padding:mobile?0:0}}><SkeletonFeed/></div>}
        {tab==="feed"&&feedContent}
        {(tab==="metrics"||(!mobile&&tab==="metrics"))&&metricsContent}
      </div>
      {meetingTarget&&<MeetingFunnel talent={meetingTarget} onClose={()=>setMeetingTarget(null)}/>}

  if(mobile) return inner;
  return(
    <div style={{display:"flex",height:"calc(100vh - 56px)",overflow:"hidden"}}>

        <div style={{padding:"0 18px 20px",borderBottom:`1px solid ${G}11`}}>
          <div style={{fontSize:10,letterSpacing:".12em",color:`${CR}55`,textTransform:"uppercase",marginBottom:3}}>Recruiter Portal</div>
          <div style={{fontFamily:"Cormorant Garamond",fontSize:15,color:CR}}>Talent Acquisition</div>
        </div>
        {[{id:"loading",l:"Vetted Talent Feed"},{id:"metrics",l:"Efficiency Metrics"}].map(t=>(
          <div key={t.id} onClick={()=>setTab(t.id)}

          <div style={{fontSize:9,color:`${CR}33`,lineHeight:1.6}}>NWA Pilot<br/>Month 1 · Foundation Gate</div>
        </div>
      </div>
      <div style={{flex:1,overflow:"hidden"}}>{inner}</div>
      {meetingTarget&&<MeetingFunnel talent={meetingTarget} onClose={()=>setMeetingTarget(null)}/>}
    </div>
  );
}

/* ══════════════════════════════════════════════
   SCOUT FLOW (with Voice-to-Vouch)
══════════════════════════════════════════════ */
function ScoutFlow({mobile}){
  const [tab,setTab]=useState("command");
  const [vouch,setVouch]=useState("");
  const [selTraits,setSelTraits]=useState([]);
  const [sent,setSent]=useState(false);
  const [ignited,setIgnited]=useState(false);
  const [borderIgnite,setBorderIgnite]=useState(false);
  const [vouchMode,setVouchMode]=useState("type"); // "type" | "voice"
  const prevLen=useRef(0);

  useEffect(()=>{
    if(prevLen.current<250&&vouch.length>=250){
      setIgnited(true);setBorderIgnite(true);
      if(navigator.vibrate)navigator.vibrate([40,20,80]);
      setTimeout(()=>setIgnited(false),700);
      setTimeout(()=>setBorderIgnite(false),700);
    }
    prevLen.current=vouch.length;
  },[vouch]);

  const sideItems=[{id:"command",label:"Command Center"},{id:"nominate",label:"Nominate Talent"},{id:"leaderboard",label:"Leaderboard"}];
  const slots=[{s:"filled",l:"NL-047"},{s:"filled",l:"NL-031"},{s:"pending",l:"Pending"},{s:"empty"},{s:"empty"}];

  const nominateContent=(
    <div className="fade-up" style={{maxWidth:520}}>
      {sent?(
        <div style={{textAlign:"center",padding:"48px 0"}}>
          <div style={{fontSize:48,marginBottom:16}}>🎫</div>
          <h2 style={{fontFamily:"Cormorant Garamond",fontSize:32,color:CR,marginBottom:8}}>Golden Ticket Issued.</h2>
          <p style={{color:`${CR}66`,fontSize:13,marginBottom:24}}>Your nomination has been sent. Sarah will receive her personalized invitation within minutes.</p>
          <button className="btn-gold" onClick={()=>{setSent(false);setVouch("");setSelTraits([]);setVouchMode("type");}} style={{padding:"12px 30px",borderRadius:9}}>Nominate Another →</button>
        </div>
      ):(
        <>
          <div style={{marginBottom:22}}>
            <div style={{fontSize:10,letterSpacing:".18em",textTransform:"uppercase",color:GHV,marginBottom:5}}>Nomination Workflow</div>
            <h2 style={{fontFamily:"Cormorant Garamond",fontSize:mobile?26:30,color:CR,marginBottom:3}}>Vouch for someone.</h2>
            <p style={{color:`${CR}55`,fontSize:12}}>You have <span style={{color:GHV}}>2 codes remaining</span>. Each nomination carries your professional reputation.</p>
          </div>
          <div className="card" style={{padding:16,marginBottom:12}}>
            <div style={{fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:`${CR}55`,marginBottom:8}}>Talent Information</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <input placeholder="First Name"/><input placeholder="Last Name"/>
              <input placeholder="Mobile Number"/><input placeholder="Email (optional)"/>
            </div>
          </div>
          <div className="card" style={{padding:16,marginBottom:12}}>
            <div style={{fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:`${CR}55`,marginBottom:8}}>Character Traits Identified</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {["Coachability","Emotional Intelligence","Motivation","Temperament"].map(t=>{
                const on=selTraits.includes(t);
                return(
                  <div key={t} onClick={()=>setSelTraits(s=>s.includes(t)?s.filter(x=>x!==t):[...s,t])}
                    style={{padding:"10px 12px",borderRadius:7,cursor:"pointer",border:`1px solid ${on?G+"66":G+"22"}`,background:on?`${G}15`:NL,color:on?GL:`${CR}66`,fontSize:12,fontWeight:500,transition:"all .15s",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:13}}>{on?"✓":"○"}</span>{t}
                  </div>
                );
              })}
            </div>
          </div>

          {/* vouch mode toggle */}
          <div style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:`${CR}55`}}>Letter of Recommendation</div>
              <div style={{display:"flex",gap:4}}>
                {[{id:"type",label:"✍ Type"},{id:"voice",label:"🎙 Voice"}].map(m=>(
                  <button key={m.id} onClick={()=>setVouchMode(m.id)} className="btn-ghost"
                    style={{padding:"4px 10px",borderRadius:6,fontSize:10,
                      background:vouchMode===m.id?`${G}18`:"transparent",
                      borderColor:vouchMode===m.id?G:`${G}33`,
                      color:vouchMode===m.id?G:`${CR}55`}}>
                    {m.label}
                  </button>
                ))}
              </div>
            </div>

            {vouchMode==="type"?(
              <>
                <div style={{display:"flex",justifyContent:"flex-end",marginBottom:6}}>
                  <span style={{fontSize:10,color:vouch.length>=250?GHV:`${CR}44`,transition:"color .3s"}}><span className="mono">{vouch.length}</span> / 250 min</span>
                </div>
                <textarea value={vouch} onChange={e=>setVouch(e.target.value)}
                  className={`stationery${borderIgnite?" ignite-border":""}`}
                  placeholder="Write as though you're penning a letter of recommendation. What specifically sets this person apart?"
                  style={{width:"100%",minHeight:130,resize:"none",borderRadius:10,padding:16,outline:"none"}}/>

              </>
            ):(
              <div className="card" style={{padding:16}}>
                <VoiceToVouch onTranscribed={t=>{setVouch(t);setVouchMode("type");}}/>
              </div>
            )}
          </div>

          {vouchMode==="type"&&(
            <button className={`btn-gold${ignited?" ignited":""}`} disabled={vouch.length<250}
              onClick={()=>setSent(true)}
              style={{width:"100%",padding:14,borderRadius:9,fontSize:12,transition:"all .3s"}}>
              {vouch.length>=250?"Issue Golden Ticket →":"Complete your vouch to continue"}
            </button>
          )}
        </>
      )}
    </div>
  );

  const commandContent=(
    <div className="fade-up">
      <div style={{marginBottom:22}}>
        <div style={{fontSize:10,letterSpacing:".18em",textTransform:"uppercase",color:GHV,marginBottom:5}}>Command Center</div>
        <h2 style={{fontFamily:"Cormorant Garamond",fontSize:mobile?26:30,color:CR}}>Your Impact Dashboard</h2>
      </div>
      <div style={{display:"grid",gridTemplateColumns:mobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:12,marginBottom:18}}>
        {[{l:"Lives Changed",v:"7",i:"✨"},{l:"Active Nominations",v:"3",i:"📋"},{l:"Codes Remaining",v:"2",i:"🎫"},{l:"Pending Earned",v:"1",i:"⏳"}].map(s=>(
          <div key={s.l} className="card card-glow" style={{padding:"16px 12px",textAlign:"center",transition:"all .2s"}}>
            <div style={{fontSize:20,marginBottom:6}}>{s.i}</div>
            <div className="mono" style={{fontSize:28,color:G,fontWeight:700,lineHeight:1}}>{s.v}</div>
            <div style={{fontSize:10,color:`${CR}66`,marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div className="card" style={{padding:20,marginBottom:14}}>
        <div style={{fontSize:9,letterSpacing:".12em",textTransform:"uppercase",color:GHV,marginBottom:4}}>Code Inventory</div>
        <div style={{fontSize:11,color:`${CR}55`,marginBottom:14}}>Each slot is a potential life changed. Empty slots are missions awaiting discovery.</div>
        <div style={{display:"flex",gap:9,alignItems:"flex-end"}}>
          {slots.map((sl,i)=>(
            <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div className={`code-slot ${sl.s==="filled"?"filled":sl.s==="pending"?"":"empty"}`} style={{background:sl.s==="pending"?`${G}08`:undefined,borderColor:sl.s==="pending"?`${G}44`:undefined,width:38,height:52,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                {sl.s==="filled"?"🎫":sl.s==="pending"?"⏳":""}
              </div>
              <div className="mono" style={{fontSize:7,color:sl.s==="filled"?GHV:sl.s==="pending"?`${G}55`:`${CR}22`,letterSpacing:".1em"}}>{sl.s==="filled"?sl.l:sl.s==="pending"?"PEND":"OPEN"}</div>
            </div>
          ))}
          <div style={{marginLeft:"auto",textAlign:"right"}}>
            <div style={{fontSize:9,color:`${CR}44`,marginBottom:2}}>Earn more by</div>
            <div style={{fontSize:11,color:GL}}>placing nominees →</div>
          </div>
        </div>
      </div>

const TSTEPS=["landing","welcome","passion","growth","aspiration","character","dashboard"];
const TLBLS=["Landing","Welcome","Passion","Growth","Aspiration","Character","Dashboard"];

function TalentFlow({mobile}){
  const [step,setStep]=useState(0);
  const [dir,setDir]=useState("right");
  const [ans,setAns]=useState({passion:"",growth:"",aspiration:""});
  const [showQuote,setShowQuote]=useState(false);

  const tiltRef=useRef();

  const go=n=>{setDir(n>step?"right":"left");setStep(n);setAnimKey(k=>k+1);if(TSTEPS[n]==="welcome"){setShowQuote(false);setTimeout(()=>setShowQuote(true),1600);}};
  const next=()=>go(Math.min(step+1,TSTEPS.length-1));
  const prev=()=>go(Math.max(step-1,0));
  const cur=TSTEPS[step];
  const cls=dir==="right"?"slide-right":"slide-left";

  const traits=[{key:"Coachability",icon:"🧠",desc:"Adapts fast, listens deeply",active:true},{key:"Emotional Intelligence",icon:"💡",desc:"Reads rooms, builds loyalty",active:true},{key:"Motivation",icon:"🔥",desc:"Driven to outperform",active:false},{key:"Temperament",icon:"⚖️",desc:"Steady under pressure",active:false}];

      )}
    </div>
  );
  return inner;
}

              <div key={s.l} style={{display:"flex",alignItems:"center",flex:1}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>
                  <div style={{width:28,height:28,borderRadius:"50%",marginBottom:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,background:s.d?`linear-gradient(135deg,${G},${GL})`:NL,border:`1px solid ${s.d?G:G+"33"}`,color:s.d?NAV:`${CR}33`}}>{s.d?"✓":i+1}</div>
                  <span style={{fontSize:9,textAlign:"center",lineHeight:1.3,color:s.d?GL:`${CR}44`}}>{s.l}</span>
                </div>
                {i<arr.length-1&&<div style={{height:1,width:16,flexShrink:0,marginBottom:20,background:s.d?`${G}55`:`${G}11`}}/>}
              </div>
            )
          ))}
        </div>
      </div>
      <div style={{background:`linear-gradient(135deg,${NM},${NL})`,border:`1px solid ${G}55`,borderRadius:12,padding:16,display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
        <div style={{position:"relative",flexShrink:0}}>
          <img src="https://i.pravatar.cc/42?img=12" style={{width:46,height:46,borderRadius:"50%",border:`2px solid ${G}`}} alt="scout"/>
          <div style={{position:"absolute",bottom:-3,right:-3,width:16,height:16,background:`linear-gradient(135deg,${G},${GL})`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8}}>✓</div>
        </div>
        <div>
          <div style={{fontSize:10,color:GHV,letterSpacing:".08em",textTransform:"uppercase",marginBottom:2}}>Scout-Verified Badge</div>
          <div style={{fontSize:14,color:CR,fontWeight:500}}>James Whitfield</div>
          <div style={{fontSize:11,color:`${CR}66`}}>SVP Operations · Walmart</div>
        </div>
        <div style={{marginLeft:"auto",background:`${G}22`,border:`1px solid ${G}44`,borderRadius:7,padding:"5px 10px"}}>
          <div style={{fontSize:9,color:GHV,letterSpacing:".08em",textTransform:"uppercase"}}>VERIFIED</div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        {[{n:"4",l:"Recruiters who viewed your profile"},{n:"1",l:"Meeting requests pending"}].map(s=>(
          <div key={s.l} className="card" style={{padding:14,textAlign:"center"}}>
            <div className="mono" style={{fontSize:26,color:G,fontWeight:700}}>{s.n}</div>
            <div style={{fontSize:10,color:`${CR}66`,marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div className="card" style={{padding:"10px 0",overflow:"hidden",position:"relative"}}>
        <div style={{position:"absolute",left:0,top:0,bottom:0,width:24,zIndex:2,background:`linear-gradient(90deg,${NM},transparent)`}}/>
        <div style={{position:"absolute",right:0,top:0,bottom:0,width:24,zIndex:2,background:`linear-gradient(-90deg,${NM},transparent)`}}/>
        <div style={{fontSize:8,letterSpacing:".14em",textTransform:"uppercase",color:GHV,padding:"0 16px 6px"}}>NWA SUCCESS STORIES</div>
        <div style={{overflow:"hidden",paddingLeft:16}}>
          <div style={{display:"flex",gap:48,animation:"tickerScroll 26s linear infinite",whiteSpace:"nowrap"}}>
            {[...NWA_STORIES,...NWA_STORIES].map((s,i)=>(<span key={i} style={{fontSize:10,color:`${CR}77`,whiteSpace:"nowrap"}}><span style={{color:G,marginRight:4}}>✦</span>{s}</span>))}
          </div>
        </div>
      </div>
    </div>
  );
  return null;
}

/* ══════════════════════════════════════════════
   ERROR TOAST
══════════════════════════════════════════════ */
function ErrorToast({msg,onClose}){
  return(
    <div className="fade-up" style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:`linear-gradient(135deg,${NM},${NL})`,border:`1px solid ${G}44`,borderRadius:12,padding:"12px 18px",display:"flex",alignItems:"center",gap:12,zIndex:500,boxShadow:`0 8px 32px rgba(0,0,0,.4),0 0 20px ${G}18`,maxWidth:460}}>
      <div style={{width:30,height:30,background:`${G}18`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>🚧</div>
      <div style={{flex:1}}>
        <div style={{fontSize:10,color:GHV,letterSpacing:".1em",textTransform:"uppercase",marginBottom:2}}>Temporary Roadblock</div>
        <div style={{fontSize:12,color:CR,lineHeight:1.5}}>{msg}</div>
      </div>
      <button onClick={onClose} style={{background:"none",border:"none",color:`${CR}44`,cursor:"pointer",fontSize:18,padding:"0 4px",lineHeight:1}}>×</button>
    </div>
  );
}

/* ══════════════════════════════════════════════
   ROOT
══════════════════════════════════════════════ */
function App(){
  const [view,setView]=useState("qr");
  const [mobile,setMobile]=useState(()=>window.innerWidth<=768);
  const [error,setError]=useState(null);

  useEffect(()=>{
    const onResize=()=>setMobile(window.innerWidth<=768);
    window.addEventListener("resize",onResize);
    return()=>window.removeEventListener("resize",onResize);
  },[]);

  useEffect(()=>{
    const t=setTimeout(()=>setError("We've hit a temporary roadblock in the lane. We're working to clear the path — stay with us."),12000);
    return()=>clearTimeout(t);
  },[]);

  const content=(
    <>
      {view==="qr"        && <QRUnboxFlow   mobile={mobile}/>}
      {view==="talent"    && <TalentFlow    mobile={mobile}/>}
      {view==="scout"     && <ScoutFlow     mobile={mobile}/>}
      {view==="recruiter" && <RecruiterFlow mobile={mobile}/>}
    </>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <TopNav view={view} setView={setView} mobile={mobile} setMobile={setMobile}/>
      {mobile?(
        <MobileFrame>{content}</MobileFrame>
      ):(
        <div style={{flex:1,overflow:"hidden"}}>{content}</div>
      )}
      {error&&<ErrorToast msg={error} onClose={()=>setError(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
