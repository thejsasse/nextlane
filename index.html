<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%}
body{font-family:'DM Sans',sans-serif;background:#0B1628;color:white;overflow:hidden;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:#0B1628}
::-webkit-scrollbar-thumb{background:#C9A84C;border-radius:2px}

/* ── tokens ── */
/* WCAG-AA high-vis gold for small functional text: #D4A843 on #0B1628 = 4.6:1 */
/* Decorative foil gold kept for display: #C9A84C */

/* ── keyframes ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(44px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-44px)}to{opacity:1;transform:translateX(0)}}
@keyframes foilShimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes igniteBtn{0%{filter:grayscale(1)opacity(.35)}55%{filter:grayscale(0)opacity(1)brightness(1.4)}100%{filter:grayscale(0)opacity(1)brightness(1)}}
@keyframes borderBleed{0%{box-shadow:0 0 0 0 rgba(201,168,76,0)}50%{box-shadow:0 0 0 7px rgba(201,168,76,.35),0 0 32px 4px rgba(201,168,76,.18)}100%{box-shadow:0 0 0 2px rgba(201,168,76,.18)}}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes typingPulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}}
@keyframes lightSweep{0%{left:-60%}100%{left:160%}}
@keyframes skeletonMove{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes laneDrawDesktop{0%{stroke-dashoffset:600}100%{stroke-dashoffset:0}}
@keyframes missionGlow{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}50%{box-shadow:0 0 24px 2px rgba(201,168,76,.12)}}

/* QR unbox sequence */
@keyframes scanLine{0%{top:0%}100%{top:100%}}
@keyframes cardReveal{0%{opacity:0;transform:scale(.85) rotateY(20deg)}60%{transform:scale(1.04) rotateY(-4deg)}100%{opacity:1;transform:scale(1) rotateY(0)}}
@keyframes goldRipple{0%{transform:scale(0);opacity:.9}100%{transform:scale(3.5);opacity:0}}
@keyframes envelopeOpen{0%{transform:scaleY(1);transform-origin:top}100%{transform:scaleY(0);transform-origin:top}}
@keyframes waveform{0%,100%{transform:scaleY(.2)}50%{transform:scaleY(1)}}
@keyframes privacyBlur{0%{filter:blur(0px)}100%{filter:blur(6px)}}
@keyframes radarDraw{0%{stroke-dashoffset:1000}100%{stroke-dashoffset:0}}
@keyframes highlightPulse{0%{background:rgba(201,168,76,.22)}60%{background:rgba(201,168,76,.08)}100%{background:rgba(201,168,76,.0)}}
.vouch-highlight{animation:highlightPulse 2s ease forwards;border-radius:6px;padding:2px 0}
@keyframes bulletReveal{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(201,168,76,.4)}70%{box-shadow:0 0 0 10px rgba(201,168,76,0)}100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}}
@keyframes verifiedRingPulse{0%{box-shadow:0 0 0 0 rgba(201,168,76,.55),0 0 0 0 rgba(201,168,76,.2)}50%{box-shadow:0 0 0 5px rgba(201,168,76,.18),0 0 0 10px rgba(201,168,76,.07)}100%{box-shadow:0 0 0 0 rgba(201,168,76,0),0 0 0 0 rgba(201,168,76,0)}}
.verified-ring{animation:verifiedRingPulse 2.4s ease infinite;border:2px solid #C9A84C !important}
@keyframes cardFlipHalf{0%{transform:perspective(800px) rotateY(0)}100%{transform:perspective(800px) rotateY(90deg)}}

.fade-up{animation:fadeUp .42s ease forwards}
.fade-in{animation:fadeIn .5s ease forwards}
.slide-right{animation:slideRight .36s cubic-bezier(.25,.8,.25,1) forwards}
.slide-left{animation:slideLeft .36s cubic-bezier(.25,.8,.25,1) forwards}

.gold-text{
  background:linear-gradient(90deg,#8B6914 0%,#C9A84C 25%,#F0D980 50%,#C9A84C 75%,#8B6914 100%);
  background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:foilShimmer 4s linear infinite}
.btn-gold{
  background:linear-gradient(135deg,#8B6914 0%,#C9A84C 30%,#F0D980 55%,#C9A84C 80%,#8B6914 100%);
  background-size:250% auto;color:#0B1628;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  font-size:12px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s,background-position .4s}
.btn-gold::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);transform:skewX(-20deg)}
.btn-gold:hover:not(:disabled)::after{animation:lightSweep .55s ease}
.btn-gold:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 28px rgba(201,168,76,.4);background-position:right center}
.btn-gold:disabled{filter:grayscale(1);opacity:.35;cursor:not-allowed}
.btn-gold.ignited{animation:igniteBtn .65s ease forwards}
.btn-ghost{background:transparent;color:#D4A843;border:1px solid rgba(201,168,76,.35);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  font-size:11px;transition:border-color .2s,background .2s,transform .2s}
.btn-ghost:hover{border-color:#C9A84C;background:rgba(201,168,76,.07);transform:translateY(-1px)}
.card{background:#122040;border:1px solid rgba(201,168,76,.13);border-radius:12px}
.card-glow{transition:border-color .25s,box-shadow .25s}
.card-glow:hover{border-color:rgba(201,168,76,.36);box-shadow:0 0 32px rgba(201,168,76,.08)}
.glass-nav{background:rgba(11,22,40,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,168,76,.18)}
.stationery{background:rgba(245,240,232,.06)!important;border:1px solid rgba(245,240,232,.15)!important;
  color:#F5F0E8!important;font-family:'Cormorant Garamond',serif!important;font-size:16px!important;
  line-height:1.85!important;letter-spacing:.01em;transition:box-shadow .3s!important}
.stationery::placeholder{color:rgba(245,240,232,.22)!important;font-style:italic}
.stationery.ignite-border{animation:borderBleed .7s ease forwards}
.mono{font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
input{background:#1A2E55;border:1px solid rgba(201,168,76,.15);border-radius:8px;padding:12px 14px;
  color:#F5F0E8;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
input:focus{border-color:rgba(201,168,76,.55)}
input::placeholder{color:rgba(245,240,232,.28)}
.scroll-y{overflow-y:auto}
.typing-dot{width:7px;height:7px;border-radius:50%;background:#C9A84C;display:inline-block;margin:0 2px;animation:typingPulse 1.2s ease infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
.skeleton{background:linear-gradient(90deg,#122040 25%,#1A2E55 50%,#122040 75%);background-size:400% 100%;animation:skeletonMove 1.8s ease infinite;border-radius:8px}
.mission-pulse{animation:missionGlow 3s ease infinite}
.view-toggle{display:flex;background:rgba(18,32,64,.85);border:1px solid rgba(201,168,76,.22);border-radius:8px;overflow:hidden}
.view-toggle button{padding:6px 14px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;transition:all .2s}

/* waveform bars */
.wave-bar{width:3px;border-radius:2px;background:linear-gradient(180deg,#C9A84C,#8B6914);transform-origin:center;animation:waveform .8s ease infinite}

/* privacy shield */
.privacy-blur{animation:privacyBlur .4s ease forwards;filter:blur(6px);user-select:none}
.privacy-clear{filter:blur(0);transition:filter .4s ease}

/* meeting funnel steps */
.funnel-step{opacity:.4;transition:opacity .3s}
.funnel-step.active{opacity:1}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const G="#C9A84C",GL="#E8C97A",GD="#8B6914",GHV="#D4A843";
const CR_AA="#C8C0B0"; // AA body copy on navy (4.8:1) — replaces CR66/CR77 for small text
const CR_SUB="#9A9080"; // decorative/secondary only
const NAV="#0B1628",NM="#122040",NL="#1A2E55",CR="#F5F0E8";
const GRAIN=`url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")`;

/* ══ TILT HOOK ══ */
function useTilt(ref){
  const onMove=useCallback(e=>{
    if(!ref.current)return;
    const r=ref.current.getBoundingClientRect();
    const x=((e.clientX-r.left)/r.width-.5)*14,y=((e.clientY-r.top)/r.height-.5)*-14;
    ref.current.style.transform=`perspective(600px) rotateY(${x}deg) rotateX(${y}deg) scale(1.02)`;
    ref.current.style.boxShadow=`${-x*1.5}px ${y*1.2}px 38px rgba(201,168,76,.24)`;
  },[ref]);
  const onLeave=useCallback(()=>{
    if(!ref.current)return;
    ref.current.style.transform="perspective(600px) rotateY(0) rotateX(0) scale(1)";
    ref.current.style.boxShadow="none";
  },[ref]);
  return{onMouseMove:onMove,onMouseLeave:onLeave};
}

/* ══ TOP NAV ══ */
function TopNav({view,setView,mobile,setMobile}){
  const [logoClicks,setLogoClicks]=useState(0);
  const logoTimerRef=useRef();

  const handleLogoClick=()=>{
    const next=logoClicks+1;
    setLogoClicks(next);
    clearTimeout(logoTimerRef.current);
    if(next>=3){setLogoClicks(0);setView("admin");}
    else{logoTimerRef.current=setTimeout(()=>setLogoClicks(0),800);}
  };

  const tabs=[
    {id:"qr",label:"QR Unbox"},
    {id:"talent",label:"Talent Journey"},
    {id:"scout",label:"Scout Center"},
    {id:"recruiter",label:"Recruiter Feed"},
    {id:"card",label:"Physical Card"},
    {id:"analytics",label:"Analytics"},
  ];
  return(
    <div className="glass-nav" style={{padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,position:"sticky",top:0,zIndex:200,flexShrink:0,gap:8}}>
      <div onClick={handleLogoClick} style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,cursor:"pointer",userSelect:"none"}}>
        <div style={{width:26,height:26,background:`linear-gradient(135deg,${GD},${G},${GL})`,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 10px ${G}44`,transition:"transform .1s",transform:logoClicks>0?"scale(1.15)":"scale(1)"}}>
          <span style={{color:NAV,fontSize:13,fontWeight:700,fontFamily:"Cormorant Garamond"}}>N</span>
        </div>
        <span style={{fontFamily:"Cormorant Garamond",fontSize:16,fontWeight:600,letterSpacing:".12em",color:view==="admin"?"#E85555":CR,whiteSpace:"nowrap"}}>NEXT LANE{view==="admin"&&<span style={{fontSize:10,color:"#E85555",marginLeft:6,letterSpacing:".08em"}}>ADMIN</span>}</span>
      </div>
      <div style={{display:"flex",gap:2,flexWrap:"wrap",justifyContent:"center"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setView(t.id)}
            style={{padding:"5px 11px",borderRadius:6,border:"none",cursor:"pointer",fontFamily:"DM Sans",fontSize:11,fontWeight:500,letterSpacing:".05em",transition:"all .2s",
              background:view===t.id?`linear-gradient(135deg,${GD},${G},${GL})`:"transparent",
              color:view===t.id?NAV:`${CR}88`,boxShadow:view===t.id?`0 3px 10px ${G}44`:"none",whiteSpace:"nowrap"}}>
            {t.label}
          </button>
        ))}
      </div>
      <div className="view-toggle" style={{flexShrink:0}}>
        <button onClick={()=>setMobile(false)} style={{background:!mobile?`${G}22`:"transparent",color:!mobile?G:`${CR}55`}}>🖥</button>
        <button onClick={()=>setMobile(true)}  style={{background: mobile?`${G}22`:"transparent",color: mobile?G:`${CR}55`}}>📱</button>
      </div>
    </div>
  );
}

/* ══ MOBILE FRAME ══ */
function MobileFrame({children}){
  return(
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at center,${NM} 0%,${NAV} 70%)`,padding:16,overflow:"auto"}}>
      <div style={{width:375,minHeight:620,maxHeight:"calc(100vh - 100px)",background:NAV,borderRadius:38,border:`2px solid ${G}33`,boxShadow:`0 28px 72px rgba(0,0,0,.6),0 0 40px ${G}18`,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",flexShrink:0}}>
        <div style={{height:32,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 22px",flexShrink:0}}>
          <span className="mono" style={{fontSize:9,color:`${CR}55`}}>9:41</span>
          <div style={{width:80,height:16,background:NAV,borderRadius:10,border:`1px solid ${G}22`}}/>
          <span style={{fontSize:9,color:`${CR}55`}}>●●●</span>
        </div>
        <div style={{flex:1,overflow:"hidden"}}>{children}</div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   QR UNBOXING SEQUENCE
══════════════════════════════════════════════ */
function QRUnboxFlow({mobile,setView,setTalentStartStep}){
  const [phase,setPhase]=useState(()=>{
    const params=new URLSearchParams(window.location.search);
    const id=params.get("id");
    return id?"reveal":"scan";
  });
  const [prefilledName]=useState(()=>{
    const params=new URLSearchParams(window.location.search);
    const id=params.get("id");
    if(!id)return null;
    // decode name from ID like "MariaG-0047"
    const raw=id.split("-")[0];
    return raw.replace(/([A-Z])/g," $1").trim();
  });
  const tiltRef=useRef();
  const tilt=useTilt(tiltRef);

  useEffect(()=>{
    if(phase==="scan"){const t=setTimeout(()=>setPhase("ripple"),2200);return()=>clearTimeout(t);}
    if(phase==="ripple"){const t=setTimeout(()=>setPhase("envelope"),900);return()=>clearTimeout(t);}
    if(phase==="envelope"){const t=setTimeout(()=>setPhase("reveal"),1100);return()=>clearTimeout(t);}
    if(phase==="reveal"){const t=setTimeout(()=>setPhase("landing"),1000);return()=>clearTimeout(t);}
  },[phase]);

  const content=(
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,position:"relative",overflow:"hidden",background:NAV,backgroundImage:GRAIN}}>

      {/* ── PHASE: SCAN ── */}
      {phase==="scan"&&(
        <div className="fade-in" style={{textAlign:"center"}}>
          <div style={{fontSize:11,letterSpacing:".2em",textTransform:"uppercase",color:GHV,marginBottom:20}}>Scanning Your Golden Ticket</div>
          {/* QR mock */}
          <div style={{width:180,height:180,margin:"0 auto 24px",position:"relative",borderRadius:16,border:`2px solid ${G}44`,padding:16,background:NM}}>
            {/* QR grid simulation */}
            <svg viewBox="0 0 120 120" style={{width:"100%",height:"100%",opacity:.7}}>
              {/* corners */}
              <rect x="4" y="4" width="28" height="28" rx="4" fill="none" stroke={G} strokeWidth="3"/>
              <rect x="8" y="8" width="20" height="20" rx="2" fill={G} opacity=".6"/>
              <rect x="88" y="4" width="28" height="28" rx="4" fill="none" stroke={G} strokeWidth="3"/>
              <rect x="92" y="8" width="20" height="20" rx="2" fill={G} opacity=".6"/>
              <rect x="4" y="88" width="28" height="28" rx="4" fill="none" stroke={G} strokeWidth="3"/>
              <rect x="8" y="92" width="20" height="20" rx="2" fill={G} opacity=".6"/>
              {/* data modules */}
              {[44,50,56,62,68,74,80].map(x=>[44,50,56,62,68,74,80].map(y=>(
                Math.random()>.5&&<rect key={`${x}${y}`} x={x} y={y} width="5" height="5" fill={G} opacity=".5"/>
              )))}
              {/* finder pattern center */}
              <rect x="54" y="54" width="12" height="12" rx="1" fill={G} opacity=".8"/>
            </svg>
            {/* scan line */}
            <div style={{position:"absolute",left:8,right:8,height:2,background:`linear-gradient(90deg,transparent,${G},transparent)`,animation:"scanLine 1.5s ease infinite",top:8,boxShadow:`0 0 8px ${G}`}}/>
          </div>
          <p style={{color:`${CR}66`,fontSize:13,lineHeight:1.7}}>Hold your Golden Ticket card<br/>up to the camera…</p>
          {/* simulate after 1s */}
          <button className="btn-ghost" onClick={()=>setPhase("ripple")} style={{marginTop:20,padding:"10px 24px",borderRadius:8,fontSize:11}}>Simulate Scan →</button>
        </div>
      )}

      {/* ── PHASE: RIPPLE ── */}
      {phase==="ripple"&&(
        <div className="fade-in" style={{textAlign:"center",position:"relative"}}>
          <div style={{width:120,height:120,margin:"0 auto",position:"relative"}}>
            {[0,1,2].map(i=>(
              <div key={i} style={{position:"absolute",inset:0,borderRadius:"50%",border:`2px solid ${G}`,animation:`goldRipple 1.2s ease ${i*.3}s forwards`,opacity:0}}/>
            ))}
            <div style={{width:"100%",height:"100%",borderRadius:"50%",background:`linear-gradient(135deg,${GD},${G},${GL})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,boxShadow:`0 0 40px ${G}66`}}>🎫</div>
          </div>
          <div style={{marginTop:24,fontFamily:"Cormorant Garamond",fontSize:22,color:CR}}>Golden Ticket Recognized</div>
        </div>
      )}

      {/* ── PHASE: ENVELOPE ── */}
      {phase==="envelope"&&(
        <div className="fade-in" style={{textAlign:"center"}}>
          <div style={{width:240,height:160,margin:"0 auto",position:"relative"}}>
            {/* envelope body */}
            <div style={{width:"100%",height:"100%",background:`linear-gradient(135deg,${NL},${NM})`,border:`1px solid ${G}55`,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
              {/* wax seal */}
              <div style={{width:60,height:60,borderRadius:"50%",background:`linear-gradient(135deg,${GD},${G},${GL})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,boxShadow:`0 0 20px ${G}66`}}>N</div>
              {/* envelope flap opening */}
              <div style={{position:"absolute",top:0,left:0,right:0,height:"50%",background:`linear-gradient(135deg,${NL},${NM})`,borderBottom:`1px solid ${G}44`,transformOrigin:"top",animation:"envelopeOpen .8s ease .2s forwards",clipPath:"polygon(0 0,50% 55%,100% 0)"}}/>
            </div>
            {/* letter rising */}
            <div style={{position:"absolute",left:16,right:16,bottom:0,height:100,background:CR,borderRadius:"6px 6px 0 0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",animation:"fadeUp .6s ease .8s both",color:NAV,padding:12}}>
              <div style={{fontSize:9,letterSpacing:".15em",textTransform:"uppercase",color:GD,marginBottom:4}}>GOLDEN TICKET</div>
              <div style={{fontFamily:"Cormorant Garamond",fontSize:14,fontWeight:600,color:NAV,textAlign:"center"}}>Exclusively for Maria Gutierrez</div>
            </div>
          </div>
        </div>
      )}

      {/* ── PHASE: REVEAL ── */}
      {phase==="reveal"&&(
        <div style={{textAlign:"center",animation:"cardReveal .9s cubic-bezier(.34,1.56,.64,1) forwards"}}>
          <div style={{fontFamily:"Cormorant Garamond",fontSize:28,color:CR,marginBottom:8}}>
            A message<br/>from <span className="gold-text">James.</span>
          </div>
        </div>
      )}

      {/* ── PHASE: LANDING ── */}
      {phase==="landing"&&(
        <div className="fade-up" style={{maxWidth:400,width:"100%",textAlign:"center"}}>
          <div style={{width:72,height:72,borderRadius:"50%",margin:"0 auto 18px",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
            <img src="https://i.pravatar.cc/52?img=12" className="verified-ring" style={{width:56,height:56,borderRadius:"50%"}} alt="scout"/>
            <div style={{position:"absolute",top:-4,left:-4,right:-4,bottom:-4,borderRadius:"50%",border:`1px solid ${G}33`,animation:"verifiedRingPulse 2.4s ease infinite 0.4s"}}/>
            <div style={{position:"absolute",bottom:2,right:2,width:18,height:18,background:`linear-gradient(135deg,${G},${GL})`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,zIndex:2}}>✓</div>
          </div>

/* ══════════════════════════════════════════════
   CHARACTER RADAR CHART (upgraded: color prop, zero-state, animated)
══════════════════════════════════════════════ */
function RadarChart({scores,size=140,color=G,animated=true}){
  const cx=size/2,cy=size/2,r=size*0.37;
  const TLABELS=["Coachability","EQ","Motivation","Temperament"];
  const raw=[scores.coachability,scores.eq,scores.motivation,scores.temperament];
  const vals=raw.map(v=>(v||0)/100);
  // zero-state: all scores 0 — render "incomplete" indicator
  const isEmpty=raw.every(v=>!v||v===0);
  // partial: fewer than 2 non-zero traits
  const filledCount=raw.filter(v=>v&&v>0).length;
  const isPartial=filledCount>0&&filledCount<2;
  const ang=i=>(i/4)*Math.PI*2-Math.PI/2;
  const pt=(i,s=1)=>({x:cx+Math.cos(ang(i))*r*s,y:cy+Math.sin(ang(i))*r*s});
  const poly=vals.map((v,i)=>{const p=pt(i,v);return`${p.x},${p.y}`}).join(" ");
  return(
    <div style={{position:"relative",display:"inline-flex",flexDirection:"column",alignItems:"center"}}>
      <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size,overflow:"visible",opacity:isEmpty?.3:1}}>
        {[.25,.5,.75,1].map(s=>(
          <polygon key={s} points={[0,1,2,3].map(i=>{const p=pt(i,s);return`${p.x},${p.y}`}).join(" ")}
            fill="none" stroke={`${color}${s===1?"44":"1A"}`} strokeWidth={s===1?"1":".5"}/>
        ))}
        {[0,1,2,3].map(i=>{const p=pt(i);return<line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke={`${color}18`} strokeWidth=".5"/>})}
        {!isEmpty&&(
          <polygon points={poly} fill={`${color}20`} stroke={color} strokeWidth="1.5"
            strokeDasharray={animated?"1000":"none"} strokeDashoffset={animated?"1000":0}
            style={animated?{animation:"radarDraw 1.1s ease forwards"}:{}}/>
        )}
        {!isEmpty&&vals.map((v,i)=>{if(!v)return null;const p=pt(i,v);return(
          <circle key={i} cx={p.x} cy={p.y} r="3" fill={color} style={{filter:`drop-shadow(0 0 3px ${color})`}}/>
        )})}
        {[0,1,2,3].map(i=>{const p=pt(i,1.3);return(
          <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle"
            fill={raw[i]>0?"#C8C0B0":"#6A6060"} fontSize="10" fontFamily="DM Sans" fontWeight="600">{TLABELS[i]}</text>
        )})}
      </svg>
      {isEmpty&&(
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",
          background:`${NAV}cc`,borderRadius:6,padding:"4px 8px",whiteSpace:"nowrap"}}>
          <span style={{fontSize:9,color:GHV,letterSpacing:".08em"}}>AWAITING TRAITS</span>
        </div>
      )}
      {isPartial&&(
        <div style={{marginTop:4,background:`${G}15`,border:`1px solid ${G}33`,borderRadius:4,padding:"2px 8px"}}>
          <span style={{fontSize:8,color:GHV,letterSpacing:".08em"}}>INCOMPLETE PROFILE</span>
        </div>
      )}
    </div>
  );
}

            {POLISHED_BULLETS.map((b,i)=>(
              <div key={i} style={{background:`${G}08`,border:`1px solid ${G}22`,borderRadius:8,padding:"10px 12px"}}>

            ))}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:10,color:`${CR}44`}}>
            <span>{transcript.length} chars · voice → AI refined</span>
            <span style={{color:G}}>✓ Ready to issue</span>
          </div>
          <button className="btn-gold" onClick={()=>onTranscribed&&onTranscribed(transcript)} style={{width:"100%",padding:"13px",borderRadius:10,marginTop:12,fontSize:12}}>Use This Vouch →</button>
        </div>
      )}
    </div>
  );
}

function PrivacyShield({name,company,children,redacted}){
  const [revealed,setRevealed]=useState(false);
  if(!redacted) return children;
  return(
    <div style={{position:"relative"}}>
      <div className={revealed?"privacy-clear":"privacy-blur"} style={{pointerEvents:revealed?"auto":"none"}}>
        {children}

      {!revealed&&(
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:`${NAV}cc`,borderRadius:10,backdropFilter:"blur(2px)"}}>
          <div style={{fontSize:18,marginBottom:8}}>🔒</div>
          <div style={{fontSize:12,fontWeight:600,color:CR,marginBottom:4}}>Privacy Shield Active</div>
          <div style={{fontSize:11,color:`${CR}66`,textAlign:"center",marginBottom:14,maxWidth:200,lineHeight:1.5}}>

  );
}

  );

function ScoutFlow({mobile}){
  const [tab,setTab]=useState("command");

      setIgnited(true);setBorderIgnite(true);

    <div className="fade-up" style={{maxWidth:520}}>

const TSTEPS=["landing","welcome","passion","growth","aspiration","character","dashboard"];
const TLBLS=["Landing","Welcome","Passion","Growth","Aspiration","Character","Dashboard"];

function TalentFlow({mobile,initialStep=0,personaName="Maria"}){
  // localStorage persistence for demo safety
  const LS_STEP="nl_talent_step";
  const LS_ANS="nl_talent_ans";

  const [step,setStep]=useState(()=>{
    if(initialStep>0)return initialStep; // QR Accept overrides
    try{const s=localStorage.getItem(LS_STEP);return s?parseInt(s,10):0;}catch{return 0;}
  });
  const [dir,setDir]=useState("right");
  const [ans,setAns]=useState(()=>{
    try{const a=localStorage.getItem(LS_ANS);return a?JSON.parse(a):{passion:"",growth:"",aspiration:""};}catch{return{passion:"",growth:"",aspiration:""};}
  });
  const [showQuote,setShowQuote]=useState(false);
  const [animKey,setAnimKey]=useState(0);
  const [copilotVisible,setCopilotVisible]=useState(false);
  const copilotTimerRef=useRef();
  const tiltRef=useRef();
  const tilt=useTilt(tiltRef);

  const cur=TSTEPS[step];

  // Persist step + answers to localStorage
  useEffect(()=>{try{localStorage.setItem(LS_STEP,step);}catch{}},[ step]);
  useEffect(()=>{try{localStorage.setItem(LS_ANS,JSON.stringify(ans));}catch{}},[ans]);

  // Start/reset the 10s AI co-pilot timer whenever we're on a writing screen
  useEffect(()=>{
    clearTimeout(copilotTimerRef.current);
    setCopilotVisible(false);
    const writingScreens=["passion","growth","aspiration"];
    if(writingScreens.includes(cur)){
      copilotTimerRef.current=setTimeout(()=>setCopilotVisible(true),10000);
    }
    return()=>clearTimeout(copilotTimerRef.current);
  },[cur]);

  const go=n=>{setDir(n>step?"right":"left");setStep(n);setAnimKey(k=>k+1);if(TSTEPS[n]==="welcome"){setShowQuote(false);setTimeout(()=>setShowQuote(true),1600);}};
  const next=()=>go(Math.min(step+1,TSTEPS.length-1));
  const prev=()=>go(Math.max(step-1,0));
  const cls=dir==="right"?"slide-right":"slide-left";

  // If we started at Welcome via QR accept, trigger the quote animation
  useEffect(()=>{
    if(initialStep===1&&cur==="welcome"){setShowQuote(false);setTimeout(()=>setShowQuote(true),1600);}
  },[]);

  const traits=[{key:"Coachability",icon:"🧠",desc:"Adapts fast, listens deeply",active:true},{key:"Emotional Intelligence",icon:"💡",desc:"Reads rooms, builds loyalty",active:true},{key:"Motivation",icon:"🔥",desc:"Driven to outperform",active:false},{key:"Temperament",icon:"⚖️",desc:"Steady under pressure",active:false}];

  const inner=(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:NAV,backgroundImage:GRAIN}}>
      {!mobile&&(
        <div style={{display:"flex",height:"calc(100vh - 56px)",overflow:"hidden"}}>
          {/* desktop sidebar */}
          <div style={{width:196,background:NM,borderRight:`1px solid ${G}22`,padding:"26px 0",flexShrink:0}}>
            <div style={{padding:"0 18px 18px",borderBottom:`1px solid ${G}11`}}>
              <div style={{fontSize:10,letterSpacing:".12em",color:`${CR}55`,textTransform:"uppercase",marginBottom:3}}>Talent Journey</div>
              <div style={{fontFamily:"Cormorant Garamond",fontSize:15,color:CR}}>Maria's Path</div>
            </div>
            {TSTEPS.map((s,i)=>(
              <div key={s} onClick={()=>go(i)} style={{padding:"9px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,background:step===i?`${G}11`:"transparent",borderLeft:step===i?`2px solid ${G}`:"2px solid transparent",transition:"all .2s"}}>
                <div style={{width:20,height:20,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,background:i<step?`linear-gradient(135deg,${G},${GL})`:i===step?"transparent":NL,border:i===step?`1px solid ${G}`:"none",color:i<step?NAV:i===step?G:`${CR}44`}}>{i<step?"✓":i+1}</div>
                <span style={{fontSize:11,fontWeight:step===i?600:400,color:step===i?CR:i<step?`${CR}88`:`${CR}44`}}>{TLBLS[i]}</span>
              </div>
            ))}
          </div>
          {/* desktop main */}
          <div className="scroll-y" style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40,position:"relative",overflowX:"hidden"}}>
            <TalentScreenContent cur={cur} animKey={animKey} cls={cls} ans={ans} setAns={setAns} showQuote={showQuote} traits={traits} next={next} prev={prev} tiltRef={tiltRef} tilt={tilt} mobile={false} step={step}/>
          </div>
          <div style={{width:190,borderLeft:`1px solid ${G}22`,background:NM,padding:16,display:"flex",flexDirection:"column",gap:10}}>
            <div style={{fontSize:9,letterSpacing:".12em",textTransform:"uppercase",color:`${CR}44`}}>Mobile Preview</div>
            <div style={{background:NAV,border:`2px solid ${G}33`,borderRadius:16,padding:12,flex:1}}>
              <div style={{fontSize:9,color:GHV,marginBottom:6,letterSpacing:".08em"}}>NEXT LANE · {TLBLS[step].toUpperCase()}</div>
              <div style={{width:"100%",height:2,background:`${G}22`,borderRadius:2,marginBottom:10,overflow:"hidden"}}>
                <div style={{width:`${((step+1)/TSTEPS.length)*100}%`,height:"100%",background:`linear-gradient(90deg,${G},${GL})`,transition:"width .4s"}}/>
              </div>
              <div style={{color:`${CR}44`,fontSize:10,lineHeight:1.6}}>Step {step+1} of {TSTEPS.length}<br/>{cur==="landing"?"Personalized Scout invite":cur==="dashboard"?"Profile live":"Conversational onboarding"}</div>
            </div>
            <div style={{fontSize:9,color:`${CR}28`,lineHeight:1.6}}>100% mobile-optimized.<br/>All steps &lt;2s on LTE.</div>
          </div>
        </div>
      )}
      {mobile&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{padding:"10px 18px 0",flexShrink:0}}>
            <div style={{display:"flex",gap:3}}>
              {TSTEPS.map((_,i)=>(<div key={i} style={{flex:1,height:2,borderRadius:2,background:i<=step?`linear-gradient(90deg,${G},${GL})`:NL,transition:"background .3s"}}/>))}

            <div style={{fontSize:9,color:`${CR}44`,marginTop:4,letterSpacing:".1em"}}>{TLBLS[step].toUpperCase()}</div>
          </div>
          <div key={animKey} className={`${cls} scroll-y`} style={{flex:1,padding:"18px 18px 0",overflowX:"hidden"}}>
            <TalentScreenContent cur={cur} animKey={animKey} cls="" ans={ans} setAns={setAns} showQuote={showQuote} traits={traits} next={next} prev={prev} tiltRef={tiltRef} tilt={tilt} mobile={true} step={step}/>
          </div>
          {cur!=="landing"&&cur!=="dashboard"&&(
            <div style={{padding:"10px 18px 20px",flexShrink:0,borderTop:`1px solid ${G}11`,background:NAV,position:"sticky",bottom:0,zIndex:10}}>

                  {cur==="character"?"Activate My Profile →":"Continue →"}

              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
  return(
    <>
      {inner}
      <AICopilotToast screen={cur} visible={copilotVisible} onDismiss={()=>setCopilotVisible(false)}/>
    </>
  );
}

function WritingScreen({cur,idx,val,title,hint,placeholders,scoutNote,question,mobile,animKey,cls,mxw,onChange,onVoiceDone,next,prev}){
  const [phIdx,setPhIdx]=useState(0);
  const [noteVisible,setNoteVisible]=useState(false);
  const noteTimerRef=useRef();

  // Cycle placeholders every 10s when textarea is empty
  useEffect(()=>{
    const t=setInterval(()=>setPhIdx(i=>(i+1)%placeholders.length),10000);
    return()=>clearInterval(t);
  },[placeholders.length]);

  // Show Scout's Note after 6s on the screen (separate from the copilot toast)
  useEffect(()=>{
    setNoteVisible(false);
    noteTimerRef.current=setTimeout(()=>setNoteVisible(true),6000);
    return()=>clearTimeout(noteTimerRef.current);
  },[cur]);

  // Hide note once user starts typing
  useEffect(()=>{if(val.length>10)setNoteVisible(false);},[val]);

  const canContinue=cur==="passion"?val.length>=20:true;

  return(
    <div key={animKey} className={cls} style={{maxWidth:mxw,width:"100%"}}>
      <div style={{fontSize:10,letterSpacing:".16em",textTransform:"uppercase",color:GHV,marginBottom:7}}>Step {idx} of 5</div>

      {/* Textarea + Scout's Note overlay */}
      <div style={{position:"relative"}}>
        <textarea value={val} onChange={e=>onChange(e.target.value)}
          className="stationery" placeholder={placeholders[phIdx]}
          style={{width:"100%",minHeight:mobile?110:128,resize:"none",borderRadius:10,padding:mobile?14:18,outline:"none",transition:"border-color .3s"}}/>

        {/* Scout's Note — inline corner card */}
        {noteVisible&&val.length===0&&(
          <div className="fade-up" style={{position:"absolute",top:8,right:8,maxWidth:mobile?160:200,background:`linear-gradient(135deg,${NM}ee,${NL}ee)`,backdropFilter:"blur(8px)",border:`1px solid ${G}55`,borderRadius:9,padding:"9px 11px",zIndex:10,pointerEvents:"none"}}>

              "{scoutNote.text}"
            </p>
          </div>
        )}
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"5px 0 18px"}}>
        <span style={{fontSize:9,color:`${CR}44`}}>{val.length} characters{cur==="passion"&&val.length<20&&val.length>0?` · ${20-val.length} more to unlock`:""}</span>
        {val.length>=20&&<span style={{fontSize:9,color:GHV}}>✓ Ready</span>}
      </div>

      {!mobile&&(
        <div style={{display:"flex",gap:10}}>

  );

   ROOT
══════════════════════════════════════════════ */
function App(){
  const [view,setView]=useState(()=>{
    const p=new URLSearchParams(window.location.search);
    const v=p.get("view");
    if(v==="scout")return"scout";
    if(v==="talent")return"talent";
    if(v==="recruiter")return"recruiter";
    return"qr";
  });
  const [talentStartStep,setTalentStartStep]=useState(0);
  const [talentPersonaName,setTalentPersonaName]=useState(()=>{
    const p=new URLSearchParams(window.location.search);
    return p.get("name")||"Maria";
  });
  const [mobile,setMobile]=useState(()=>window.innerWidth<=768);
  const [error,setError]=useState(null);

  useEffect(()=>{
    const onResize=()=>setMobile(window.innerWidth<=768);
    window.addEventListener("resize",onResize);
    return()=>window.removeEventListener("resize",onResize);
  },[]);

  useEffect(()=>{
    const t=setTimeout(()=>setError("We've hit a temporary roadblock in the lane. We're working to clear the path — stay with us."),12000);
    return()=>clearTimeout(t);
  },[]);

  const content=(
    <>
      {view==="qr"        && <QRUnboxFlow   mobile={mobile} setView={setView} setTalentStartStep={setTalentStartStep}/>}
      {view==="talent"    && <TalentFlow    mobile={mobile} initialStep={talentStartStep} personaName={talentPersonaName}/>}
      {view==="scout"     && <ScoutFlow     mobile={mobile}/>}
      {view==="recruiter" && <RecruiterFlow mobile={mobile}/>}
      {view==="card"      && <PhysicalCard  mobile={mobile}/>}
      {view==="analytics" && <AnalyticsView mobile={mobile}/>}
      {view==="admin"     && <AdminDashboard mobile={mobile}/>}
    </>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <TopNav view={view} setView={setView} mobile={mobile} setMobile={setMobile}/>
      {mobile?(
        <MobileFrame>{content}</MobileFrame>
      ):(
        <div style={{flex:1,overflow:"hidden"}}>{content}</div>
      )}
      {error&&<ErrorToast msg={error} onClose={()=>setError(null)}/>}
    </div>
  );
}

                    {[{l:"Feed Views",v:d.views,c:"#6AAFDD"},{l:"Meeting Req.",v:d.requests,c:G},{l:"Demand Index",v:`${Math.round((d.requests/d.views)*100)}%`,c:"#4CAF50"}].map(m=>(
                      <div key={m.l} style={{background:NL,borderRadius:7,padding:"9px 10px",textAlign:"center"}}>
                        <div className="mono" style={{fontSize:18,color:m.c,lineHeight:1,marginBottom:2}}>{m.v}</div>
                        <div style={{fontSize:9,color:CR_AA}}>{m.l}</div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div className="card" style={{padding:18,background:`${G}08`,border:`1px solid ${G}33`}}>
              <div style={{fontSize:9,color:GHV,letterSpacing:".12em",textTransform:"uppercase",marginBottom:8}}>Investor Narrative</div>
              <div style={{fontSize:12,color:CR_AA,lineHeight:1.75}}>
                In Month 1, NextLane generated <span style={{color:GL}}>14 meeting requests</span> across 3 talent profiles from 89 recruiter feed views — a <span style={{color:GL}}>15.7% demand conversion rate</span>. Traditional job boards average 0.8%. With a $1,000 placement fee and 86% offer-accept rate, the pipeline projects <span style={{color:GL}}>$6,000 in Month 1 GMV</span> from a 12-scout cohort.
              </div>
            </div>
          </div>
        )}

        {tab==="economy"&&(
          <div className="fade-up">
            <div style={{fontFamily:"Cormorant Garamond",fontSize:mobile?22:28,color:CR,marginBottom:4}}>NWA Economic Engine</div>
            <div style={{fontSize:11,color:`${CR}44`,marginBottom:22}}>Projected wage impact generated this month · Founder view</div>

            {/* Total impact hero */}
            <div style={{background:`linear-gradient(135deg,${NM},${NL})`,border:`1px solid ${G}55`,borderRadius:14,padding:mobile?18:26,marginBottom:18,textAlign:"center",boxShadow:`0 8px 32px rgba(0,0,0,.3),0 0 40px ${G}11`}}>
              <div style={{fontSize:10,letterSpacing:".18em",textTransform:"uppercase",color:GHV,marginBottom:10}}>Total Projected Wage Increase · Month 1</div>
              <div className="mono" style={{fontSize:mobile?38:54,color:G,fontWeight:700,lineHeight:1,marginBottom:6}}>$69,000</div>
              <div style={{fontSize:11,color:`${CR}55`,marginBottom:18}}>in local economic impact · NWA region</div>
              <div style={{display:"flex",justifyContent:"center",gap:mobile?14:28,flexWrap:"wrap"}}>
                {[{l:"Families Impacted",v:"3"},{l:"Region",v:"NWA"},{l:"Est. Tax Contribution",v:"$8.3k"}].map(m=>(
                  <div key={m.l} style={{textAlign:"center"}}>
                    <div className="mono" style={{fontSize:16,color:GL,fontWeight:600}}>{m.v}</div>
                    <div style={{fontSize:9,color:`${CR}44`}}>{m.l}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Per-talent wage cards */}
            <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:18}}>
              {TALENTS.map((t,i)=>{
                const lift=t.wageTo-t.wageFrom;
                const pct=Math.round((lift/t.wageFrom)*100);
                const barW=Math.round((lift/69)*100);
                return(
                  <div key={t.id} className="card" style={{padding:mobile?14:18}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                      <img src={`https://i.pravatar.cc/34?img=${20+i}`} style={{width:34,height:34,borderRadius:"50%",border:`2px solid ${G}44`}} alt={t.name}/>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:600,color:CR}}>{t.name}</div>
                        <div style={{fontSize:10,color:`${CR}55`}}>Vouched by {t.scout}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div className="mono" style={{fontSize:10,color:`${CR}33`,textDecoration:"line-through"}}>${t.wageFrom}k</div>
                        <div className="mono" style={{fontSize:18,color:G,fontWeight:700}}>${t.wageTo}k</div>
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{flex:1,height:5,background:NL,borderRadius:3,overflow:"hidden"}}>
                        <div style={{width:`${barW}%`,height:"100%",background:`linear-gradient(90deg,${GD},${G},${GL})`,borderRadius:3}}/>
                      </div>
                      <span style={{fontSize:10,color:GL,fontWeight:600,flexShrink:0}}>+${lift}k</span>
                      <span style={{fontSize:9,color:GHV,background:`${G}15`,padding:"1px 6px",borderRadius:3,flexShrink:0}}>+{pct}%</span>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Series A narrative */}
            <div className="card" style={{padding:mobile?16:20,background:`${G}08`,border:`1px solid ${G}44`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{width:22,height:22,background:`linear-gradient(135deg,${GD},${G})`,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10}}>📊</div>
                <div style={{fontSize:9,letterSpacing:".12em",textTransform:"uppercase",color:GHV}}>Series A Investor Narrative</div>
              </div>
              <div style={{fontFamily:"Cormorant Garamond",fontSize:mobile?15:17,color:CR,lineHeight:1.78,marginBottom:16}}>
                "NextLane isn't a hiring tool — it's a <span style={{color:GL}}>regional economic engine</span>. In Month 1, we generated <span style={{color:GL}}>$69,000 in projected wage increases</span> across just 3 placements in NWA. At 50 placements per month, that's <span style={{color:GL}}>$1.15M in annual wage lift</span> per cohort — compounding year over year as Scouts earn placement credits and reinvest them."
              </div>
              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"repeat(3,1fr)",gap:10}}>
                {[{l:"Month 1 Wage Lift",v:"$69k",c:G},{l:"Proj. @ 50 placements/mo",v:"$1.15M/yr",c:GL},{l:"Multiplier per Scout",v:"7× wages",c:"#4CAF50"}].map(m=>(
                  <div key={m.l} style={{background:NL,borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
                    <div className="mono" style={{fontSize:mobile?16:20,color:m.c,fontWeight:700,lineHeight:1,marginBottom:3}}>{m.v}</div>
                    <div style={{fontSize:9,color:`${CR}44`}}>{m.l}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
